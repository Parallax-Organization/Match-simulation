<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Esports Manager Pro - ULTRA Engine 5.0">
<meta name="version" content="5.0.0">
<meta name="author" content="Gemini AI Collaboration">
<title>MATCH SIMULATION v5.0.0 ULTRA</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
    /* GLOBAL THEME DEFINITIONS */
    :root { 
        --bg: #0f111a; 
        --card: #161925; 
        --text: #e0e0e0; 
        --accent: #ff9800; /* Переход на фирменный оранжевый */
        --danger: #ff4b2b; 
        --info: #00b4ff; 
        --t-color: #ff9800; 
        --ct-color: #4a90e2; 
        --shadow: 0 15px 45px rgba(0,0,0,0.7);
        --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* ANIMATIONS */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,152,0,0.4); } 70% { box-shadow: 0 0 0 10px rgba(255,152,0,0); } 100% { box-shadow: 0 0 0 0 rgba(255,152,0,0); } }

    body { 
        font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; 
        background: var(--bg); 
        color: var(--text); 
        margin: 0; 
        padding: 20px; 
        line-height: 1.6; 
        overflow-x: hidden;
    }

    .container { 
        max-width: 950px; 
        margin: 20px auto; 
        background: var(--card); 
        padding: 40px; 
        border-radius: 24px; 
        border: 1px solid rgba(255,255,255,0.08); 
        box-shadow: var(--shadow); 
        animation: fadeIn 0.6s ease-out;
    }
    
    h1 { 
        color: var(--accent); 
        margin: 0; 
        text-align: center; 
        letter-spacing: 5px; 
        text-transform: uppercase; 
        font-size: 2.5em; 
        font-weight: 900;
        text-shadow: 0 0 20px rgba(255,152,0,0.2);
    }
    
    .sub-title { 
        color: var(--info); 
        text-align: center; 
        font-weight: bold; 
        letter-spacing: 8px; 
        margin-bottom: 35px; 
        font-size: 0.9em; 
        text-transform: uppercase;
        opacity: 0.7;
    }

    /* ULTRA 5.0 CSS ADDITIONS */
    .player-input-grid { display: grid; grid-template-columns: 2fr 1.5fr 1fr; gap: 8px; margin-bottom: 10px; }
    .economy-badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; margin-left: 10px; text-transform: uppercase; font-weight: 900; }
    .eco { background: rgba(255, 75, 43, 0.2); color: #ff4b2b; border: 1px solid #ff4b2b; }
    .force { background: rgba(0, 180, 255, 0.2); color: #00b4ff; border: 1px solid #00b4ff; }
    .full { background: rgba(0, 255, 65, 0.2); color: #00ff41; border: 1px solid #00ff41; }
    .phase-log { font-size: 10px; opacity: 0.5; font-style: italic; margin-left: 15px; color: #888; }
    .btn-step { background: #607d8b !important; color: white !important; }
    .player-card { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; margin: 8px 0; font-size: 13px; border: 1px solid #2d334a; }
    .role-tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #333; color: var(--accent); margin-right: 8px; text-transform: uppercase; }

    /* CHANGELOG MODULE STYLING */
    .changelog-container { 
        background: linear-gradient(145deg, #0a0c14, #121520); 
        border: 1px solid #2d334a; 
        padding: 25px; 
        border-radius: 18px; 
        margin-bottom: 40px; 
        border-left: 6px solid var(--accent); 
        position: relative;
    }
    
    .changelog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .nav-btns { display: flex; gap: 15px; }
    .nav-btn { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; background: #1f2335; border: 1px solid #414868; border-radius: 12px; cursor: pointer; color: var(--accent); transition: var(--transition); font-weight: bold; font-size: 22px; }
    .nav-btn:hover { background: var(--accent); color: #000; transform: scale(1.05) rotate(5deg); }
    .changelog-content { font-size: 14px; color: #a0a0a0; }
    .changelog-content ul { padding-left: 25px; margin: 12px 0; list-style-type: square; }
    .changelog-content li { margin-bottom: 7px; }
    .ver-title { color: var(--info); font-weight: 800; font-size: 1.3em; text-transform: uppercase; }

    /* FORM COMPONENTS */
    input, select { background: #1f2335; border: 2px solid #2d334a; color: white; padding: 14px 18px; border-radius: 12px; margin: 8px; font-size: 14px; outline: none; transition: var(--transition); }
    input:focus, select:focus { border-color: var(--info); background: #252a3f; }
    button { background: var(--accent); color: #000; border: none; padding: 14px 30px; border-radius: 12px; cursor: pointer; font-weight: 900; text-transform: uppercase; transition: var(--transition); box-shadow: 0 4px 0px rgba(0,0,0,0.2); }
    button:hover { filter: brightness(1.15); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255,152,0,0.25); }

    /* TOURNAMENT INTERFACE */
    .tourney-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
    .tourney-card { background: linear-gradient(135deg, #1f2335, #161925); padding: 30px; border-radius: 20px; border: 1px solid #2d334a; text-align: center; cursor: pointer; transition: var(--transition); position: relative; }
    .tourney-card:hover { border-color: var(--accent); transform: translateY(-8px); }
    .status-badge { font-size: 10px; text-transform: uppercase; padding: 4px 12px; border-radius: 20px; margin-bottom: 15px; display: inline-block; font-weight: 800; letter-spacing: 1px; }
    .status-active { background: rgba(255, 152, 0, 0.1); color: var(--accent); border: 1px solid var(--accent); animation: pulse 2s infinite; }
    .status-finished { background: rgba(255, 75, 43, 0.1); color: var(--danger); border: 1px solid var(--danger); }

    /* MATCH STYLES */
    .team-item { display: flex; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 16px; margin: 12px 0; border-radius: 14px; border-left: 5px solid var(--info); transition: 0.2s; cursor: pointer; }
    .team-item:hover { background: rgba(255,255,255,0.06); border-left-color: var(--accent); }
    .match-card { background: #1f2335; padding: 28px; border-radius: 20px; margin-bottom: 30px; border-left: 8px solid var(--accent); position: relative; }
    .match-stage { position: absolute; top: -14px; left: 25px; background: var(--accent); color: #000; padding: 4px 16px; border-radius: 8px; font-size: 11px; font-weight: 900; }
    .map-row { background: rgba(0,0,0,0.4); padding: 22px; margin: 22px 0; border-radius: 16px; border: 1px solid #33394d; }
    .round-history { font-family: 'Fira Code', monospace; background: #050505; padding: 20px; border-radius: 12px; margin-top: 15px; line-height: 2.2; font-size: 13px; color: #ddd; border: 1px solid #1a1a1a; }
    .r-t { color: var(--t-color); font-weight: bold; }
    .r-ct { color: var(--ct-color); font-weight: bold; }
    .badge { padding: 6px 14px; border-radius: 7px; font-size: 11px; font-weight: 800; margin-right: 12px; display: inline-block; text-transform: uppercase; }
    .badge-t { background: var(--t-color); color: white; }
    .badge-ct { background: var(--ct-color); color: white; }
    .veto-box { background: #080a0f; padding: 20px; border-radius: 12px; font-family: monospace; font-size: 13px; margin-top: 20px; color: #94a3b8; border: 1px dashed #334155; }
    .toggle-veto { color: var(--info); cursor: pointer; font-size: 12px; text-decoration: underline; margin-top: 20px; display: block; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: #0a0c14; padding: 15px 30px; border-radius: 16px; border: 1px solid #2d334a; }
</style>
</head>
<body>

<div class="container">
    <div id="authSection">
        <h1>MATCH SIMULATION</h1>
        <div class="sub-title">VERSION 5.0.0 ULTRA</div>
        
        <div class="changelog-container">
            <div class="changelog-header">
                <span id="verTitle" class="ver-title"></span>
                <div class="nav-btns">
                    <span class="nav-btn" onclick="changeLog(-1)">←</span>
                    <span class="nav-btn" onclick="changeLog(1)">→</span>
                </div>
            </div>
            <div id="changelogContent" class="changelog-content"></div>
        </div>
        
        <div style="text-align: center; background: rgba(255,255,255,0.02); padding: 30px; border-radius: 20px;">
            <input type="password" id="pass" placeholder="Ключ доступа администратора">
            <div style="margin-top: 30px;">
                <button onclick="auth(true)">Панель управления</button>
                <button onclick="auth(false)" style="background: #414868; color: white; margin-left: 10px;">Режим зрителя</button>
            </div>
        </div>
    </div>

    <div id="tourneySection" style="display:none;">
        <button onclick="logout()" style="float:right; background:#333; color:white; font-size:12px;">Выйти из системы</button>
        <h2 style="margin-top:0;">Навигатор турниров</h2>
        <div id="adminTourneyCreate" style="display:none; margin-bottom:30px; background: rgba(0,180,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(0,180,255,0.2);">
            <input type="text" id="newTourneyName" placeholder="Название нового ивента">
            <button onclick="createTourney()">Создать турнир</button>
        </div>
        <div id="tourneyList" class="tourney-grid"></div>
    </div>

    <div id="mainPanel" style="display:none;">
        <div class="top-bar">
            <div>Текущий ивент: <b id="activeTourneyName" style="color:var(--accent); font-size:1.1em;"></b></div>
            <div id="tourneyStatusArea"></div>
            <div>
                <button onclick="exitTourney()" style="background:#444; color:white; padding: 8px 16px; font-size:11px; border-radius: 8px;">Назад</button>
                <button onclick="logout()" style="background:var(--danger); color:white; padding: 8px 16px; font-size:11px; border-radius: 8px; margin-left:5px;">Выход</button>
            </div>
        </div>
        
        <div id="adminContent" style="display:none;">
            <div class="match-card">
                <h3><span style="color:var(--info)">01.</span> Ростер команд</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: center;">
                    <input type="text" id="tName" placeholder="Имя команды">
                    <input type="number" id="tPower" placeholder="Power (Базовая)" value="100">
                    <button onclick="addTeam()" style="height: 50px;">Добавить</button>
                </div>
                <div id="teamsDisplay" style="margin-top:20px;"></div>
                
                <div id="playerManager" style="display:none; margin-top:20px; border-top: 1px solid #333; padding-top:20px; animation: fadeIn 0.3s ease;">
                    <h4 style="margin-bottom:15px;">Игроки: <span id="managedTeamName" style="color:var(--accent)"></span></h4>
                    <div id="playerList"></div>
                    <div class="player-input-grid">
                        <input type="text" id="pNick" placeholder="Никнейм">
                        <select id="pRole">
                            <option value="Captain">Капитан (IGL)</option>
                            <option value="Sniper">Снайпер (AWP)</option>
                            <option value="Entry">Энтри-фраггер</option>
                            <option value="Support">Саппорт</option>
                            <option value="Lurker">Люркер</option>
                        </select>
                        <input type="number" id="pPower" placeholder="Skill" value="100">
                    </div>
                    <button onclick="savePlayer()" style="width:100%; font-size:12px; background:var(--info); color:white;">Зачислить игрока в состав</button>
                </div>
            </div>
            
            <div class="match-card">
                <h3><span style="color:var(--info)">02.</span> Планировщик матчей</h3>
                <input type="text" id="matchStageName" placeholder="Этап турнира" style="width: 95%;">
                <div style="display: flex; align-items: center; justify-content: center; margin: 15px 0;">
                    <select id="sel1"></select> 
                    <span style="margin: 0 15px; font-weight: 900; color: var(--accent);">VS</span> 
                    <select id="sel2"></select>
                </div>
                <div style="text-align: center;">
                    <select id="bo" style="width: 200px;">
                        <option value="1">Best of 1</option>
                        <option value="3">Best of 3</option>
                    </select>
                    <button onclick="startVeto()" style="background:var(--info); color:white; margin-left:10px;">Запустить Veto</button>
                </div>
            </div>
            
            <div id="currentSeriesDisplay" style="display:none;" class="match-card">
                <div class="match-stage" style="background: var(--info);">Live Simulation</div>
                <h2 id="seriesTitle" style="text-align:center; margin: 10px 0 25px 0; font-size: 1.8em;"></h2>
                <div id="vetoLogLive" class="veto-box"></div>
                <div id="mapControls" style="text-align:center; margin-top:25px;"></div>
            </div>
        </div>
        
        <div id="matchHistory"></div>
    </div>
</div>

<script>
/* ========================================================================
   ULTRA ENGINE JAVASCRIPT - v5.0.0
   ======================================================================== */

const firebaseConfig = {
  apiKey: "AIzaSyDaZmAmodUvLKcPSJ85SImjtBKdAIUUd_s",
  authDomain: "match-simulation.firebaseapp.com",
  databaseURL: "https://match-simulation-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "match-simulation",
  storageBucket: "match-simulation.firebasestorage.app",
  messagingSenderId: "991337782669",
  appId: "1:991337782669:web:addc6ead3cdc08baab71c4"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const MAP_DATA = { 
    "Mirage": { bonus: 1.5, side: "CT" }, 
    "Inferno": { bonus: 2.8, side: "CT" }, 
    "Nuke": { bonus: 3.5, side: "CT" }, 
    "Ancient": { bonus: 2.2, side: "CT" }, 
    "Anubis": { bonus: 2.0, side: "T" }, 
    "Dust2": { bonus: 0.7, side: "T" }, 
    "Vertigo": { bonus: 1.2, side: "CT" } 
};
const MAP_POOL = Object.keys(MAP_DATA);

const UPDATES = [
    { v: "5.0.0", items: ["Глобальное обновление: Переход на движок ULTRA Engine.", "Система экономики: Эко, Форс, Фулл-бай.", "Ростеры: 5 ролей игроков с уникальным вкладом в раунд.", "Поэтапная симуляция: Entry-килл, Mid-round и Clutch фазы.", "Пораундовая симуляция: Кнопка ручного ведения матча."] },
    { v: "4.17.3", items: ["Исправлен визуальный баг с двойным переносом строк (MR12).", "Оптимизирована сетка овертаймов: теперь перенос происходит строго каждые 3 раунда."] },
    { v: "4.17", items: ["В историю матчей добавлено отображение силы команд.", "Исправлен баг выбора сторон после ножей."] }
];

let currentLogIdx = 0, teams = [], tournaments = [], matches = [], activeMatch = null;
let currentRole = sessionStorage.getItem("es_role"), currentTourneyId = localStorage.getItem("es_tourney_id");
let selectedTeamIdx = null, stepData = null;

// --- CORE FUNCTIONS ---
function changeLog(dir) { currentLogIdx = (currentLogIdx + dir + UPDATES.length) % UPDATES.length; renderLog(); }
function renderLog() {
    const up = UPDATES[currentLogIdx];
    document.getElementById("verTitle").innerText = "Version " + up.v;
    document.getElementById("changelogContent").innerHTML = `<ul>${up.items.map(i => `<li>${i}</li>`).join("")}</ul>`;
}
renderLog();

function auth(isAdmin) {
    const _access_vault = "UEFSQUxMQVgzOTUwUA==";
    if (isAdmin === true) {
        let inputPass = document.getElementById("pass").value;
        if (btoa(inputPass) === _access_vault) {
            currentRole = "admin";
            sessionStorage.setItem("es_role", "admin");
            checkState();
            return;
        } else return alert("Доступ заблокирован.");
    }
    currentRole = "viewer";
    sessionStorage.setItem("es_role", "viewer");
    checkState();
}

function checkState() {
    const authUI = document.getElementById("authSection"), tourneyUI = document.getElementById("tourneySection"), mainUI = document.getElementById("mainPanel"), adminUI = document.getElementById("adminContent");
    authUI.style.display = !currentRole ? "block" : "none";
    if(currentRole) {
        if(!currentTourneyId) {
            tourneyUI.style.display = "block";
            mainUI.style.display = "none";
            document.getElementById("adminTourneyCreate").style.display = currentRole === "admin" ? "block" : "none";
            loadTournaments();
        } else {
            tourneyUI.style.display = "none";
            mainUI.style.display = "block";
            adminUI.style.display = currentRole === "admin" ? "block" : "none";
            loadTourneyData();
        }
    }
}

function loadTournaments() {
    db.ref("tournaments").on("value", s => {
        const val = s.val() || {};
        tournaments = Object.keys(val).map(k => ({...val[k], realId: k})).sort((a,b) => b.id - a.id);
        document.getElementById("tourneyList").innerHTML = tournaments.map(t => `
            <div class="tourney-card ${t.status === 'finished' ? 'finished' : ''}" onclick="selectTourney('${t.realId}')">
                <span class="status-badge ${t.status === 'active' ? 'status-active' : 'status-finished'}">${t.status === 'active' ? '• Активен' : '✓ В архиве'}</span>
                <br><b>${t.name}</b>
            </div>`).join("");
    });
}

function selectTourney(id) { currentTourneyId = id; localStorage.setItem("es_tourney_id", id); checkState(); }
function logout() { sessionStorage.clear(); localStorage.clear(); location.reload(); }
function exitTourney() { localStorage.removeItem("es_tourney_id"); currentTourneyId = null; checkState(); }

function loadTourneyData() {
    db.ref("tournaments/" + currentTourneyId).on("value", s => {
        const t = s.val(); if(!t) return exitTourney();
        document.getElementById("activeTourneyName").innerText = t.name;
    });
    db.ref("teams/" + currentTourneyId).on("value", s => { teams = s.val() || []; updateSelectors(); });
    db.ref("matches/" + currentTourneyId).on("value", s => { matches = Object.values(s.val() || {}).reverse(); renderHistory(); });
}

// --- TEAM & PLAYER MANAGEMENT ---
function updateSelectors() {
    const d = document.getElementById("teamsDisplay");
    if(d) d.innerHTML = teams.map((t,i)=>`
        <div class="team-item" onclick="showPlayerManager(${i})">
            <span><b>${t.name}</b> <small style="color:var(--info)">[Power: ${t.power}]</small></span>
            <b onclick="event.stopPropagation(); deleteTeam(${i})" style="color:var(--danger); font-size:18px;">×</b>
        </div>`).join("");
    const s1 = document.getElementById("sel1"), s2 = document.getElementById("sel2");
    if(s1 && s2) { s1.innerHTML=""; s2.innerHTML=""; teams.forEach((t,i)=>{ s1.add(new Option(t.name,i)); s2.add(new Option(t.name,i)); }); }
}

function addTeam() { 
    let n = document.getElementById("tName"), p = document.getElementById("tPower"); 
    if(n.value) { teams.push({ name: n.value, power: parseInt(p.value) || 100, players: [] }); db.ref("teams/" + currentTourneyId).set(teams); n.value=""; } 
}

function deleteTeam(i) { if(confirm("Удалить команду?")) { teams.splice(i,1); db.ref("teams/" + currentTourneyId).set(teams); } }

function showPlayerManager(idx) {
    selectedTeamIdx = idx;
    const t = teams[idx];
    document.getElementById("playerManager").style.display = "block";
    document.getElementById("managedTeamName").innerText = t.name;
    renderPlayers();
}

function renderPlayers() {
    const t = teams[selectedTeamIdx];
    if(!t.players) t.players = [];
    document.getElementById("playerList").innerHTML = t.players.map((p, i) => `
        <div class="player-card">
            <span class="role-tag">${p.role}</span> <b>${p.nick}</b> 
            <span style="color:var(--accent); margin-left:10px;">⚡ ${p.power}</span>
            <span onclick="removePlayer(${i})" style="float:right; color:var(--danger); cursor:pointer; font-weight:bold;">Удалить</span>
        </div>
    `).join("");
}

function savePlayer() {
    const t = teams[selectedTeamIdx];
    if(!t.players) t.players = [];
    if(t.players.length >= 5) return alert("Лимит состава: 5 человек.");
    
    t.players.push({
        nick: document.getElementById("pNick").value || "Player",
        role: document.getElementById("pRole").value,
        power: parseInt(document.getElementById("pPower").value) || 100
    });
    
    t.power = t.players.reduce((sum, p) => sum + p.power, 0);
    db.ref("teams/" + currentTourneyId).set(teams);
    renderPlayers();
    updateSelectors();
}

function removePlayer(i) {
    teams[selectedTeamIdx].players.splice(i, 1);
    teams[selectedTeamIdx].power = teams[selectedTeamIdx].players.reduce((sum, p) => sum + p.power, 0) || 100;
    db.ref("teams/" + currentTourneyId).set(teams);
    renderPlayers();
    updateSelectors();
}

// --- ULTRA 5.0 ENGINE (ECONOMY & PHASES) ---
function conductRound(t1, t2, m, s) {
    let b = MAP_DATA[m.name].bonus; 
    let sideStrong = MAP_DATA[m.name].side;
    let t1IsT = (s.r < 12) ? s.t1T : !s.t1T;
    if(s.r >= 24) t1IsT = (Math.floor((s.r-24)/3) % 2 === 0) ? s.t1T : !s.t1T;

    // 1. Экономика
    let buy1 = s.m1 >= 3900 ? "FULL" : (s.m1 >= 2100 ? "FORCE" : "ECO");
    let buy2 = s.m2 >= 3900 ? "FULL" : (s.m2 >= 2100 ? "FORCE" : "ECO");

    // 2. Базовый шанс
    let c1 = (t1.power / (t1.power + t2.power)) * 100;
    if (sideStrong === "CT") { if (!t1IsT) c1 += b; else c1 -= b; } else { if (t1IsT) c1 += b; else c1 -= b; }
    
    if(buy1 === "FULL" && buy2 === "ECO") c1 += 28;
    if(buy1 === "ECO" && buy2 === "FULL") c1 -= 28;
    if(buy1 === "FORCE" && buy2 === "FULL") c1 -= 12;

    // 3. Фазы (Entry -> Mid -> Clutch)
    let log = "";
    let entryWin = Math.random() * 100 < (c1 + (t1IsT ? 5 : -5));
    if(entryWin) { c1 += 15; log = "Entry OK"; } else { c1 -= 15; log = "Entry LOST"; }
    
    let midWin = Math.random() * 100 < c1;
    if(Math.abs(c1 - 50) < 8) { log += " -> Clutch!"; if(Math.random() > 0.5) midWin = !midWin; }

    // Награды
    let ecoLabel1 = `<span class="economy-badge ${buy1.toLowerCase()}">${buy1}</span>`;
    let ecoLabel2 = `<span class="economy-badge ${buy2.toLowerCase()}">${buy2}</span>`;

    if(midWin) { 
        s.r1++; s.l1=0; s.l2++; 
        s.m1 += 3250; s.m2 += (1400 + (Math.min(s.l2, 5) * 500));
    } else { 
        s.r2++; s.l2=0; s.l1++; 
        s.m2 += 3250; s.m1 += (1400 + (Math.min(s.l1, 5) * 500));
    }
    
    if(s.m1 > 16000) s.m1 = 16000; if(s.m2 > 16000) s.m2 = 16000;
    s.h.push(`<span class="${t1IsT?'r-t':'r-ct'}">${s.r1}</span>:<span class="${t1IsT?'r-ct':'r-t'}">${s.r2}</span> ${ecoLabel1}${ecoLabel2} <span class="phase-log">${log}</span>`);
    
    if (s.r === 11 || (s.r >= 23 && (s.r - 23) % 3 === 0)) s.h.push("<br>");
    s.r++;
    return s;
}

function playOneRound() {
    let am = activeMatch, mObj = am.maps[am.currentMapIdx];
    if(!stepData || stepData.mapIdx !== am.currentMapIdx) {
        stepData = { r1:0, r2:0, l1:0, l2:0, r:0, h:[], m1: 800, m2: 800, mapIdx: am.currentMapIdx, t1T: (mObj.t_start === am.t1.name) };
    }

    stepData = conductRound(am.t1, am.t2, mObj, stepData);
    document.getElementById("seriesTitle").innerText = `${am.t1.name} vs ${am.t2.name} [${am.wins1}:${am.wins2}] | Карта: ${stepData.r1}:${stepData.r2}`;

    let isFin = false;
    if((stepData.r1===13 && stepData.r2<12) || (stepData.r2===13 && stepData.r1<12)) isFin = true;
    if(stepData.r1>=12 && stepData.r2>=12){ 
        let lim=16; while(stepData.r1>lim-1 && stepData.r2>lim-1) lim+=3; 
        if((stepData.r1===lim && Math.abs(stepData.r1-stepData.r2)>=2) || (stepData.r2===lim && Math.abs(stepData.r2-stepData.r1)>=2)) isFin = true; 
    }

    if(isFin) {
        am.results.push({ name: mObj.name, score: `${stepData.r1}:${stepData.r2}`, rounds: stepData.h, t_start: mObj.t_start, ct_start: mObj.ct_start, sideBonus: MAP_DATA[mObj.name].side, bonus: MAP_DATA[mObj.name].bonus });
        if(stepData.r1 > stepData.r2) am.wins1++; else am.wins2++;
        am.currentMapIdx++;
        db.ref(`matches/${currentTourneyId}/${am.id}`).update({ total: `${am.wins1}:${am.wins2}`, details: am.results });
        stepData = null;
        if(am.wins1 >= Math.ceil(am.bo/2) || am.wins2 >= Math.ceil(am.bo/2)) { 
            activeMatch = null; document.getElementById("currentSeriesDisplay").style.display="none"; 
        } else renderActiveMatch();
    }
}

// --- VETO & HISTORY ---
function startVeto() {
    let i1 = document.getElementById("sel1").value, i2 = document.getElementById("sel2").value, bo = parseInt(document.getElementById("bo").value), stage = document.getElementById("matchStageName").value.trim();
    let t1 = teams[i1], t2 = teams[i2], pool = [...MAP_POOL], log = [], maps = [];
    
    if(bo == 1) {
        for(let i=0; i<6; i++) log.push(`${(i%2==0?t1.name:t2.name)} забанил ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        let rSide = Math.random()>0.5; maps.push({name:pool[0], t_start: rSide?t1.name:t2.name, ct_start: rSide?t2.name:t1.name});
        log.push(`Карта: ${pool[0]}. ${rSide?t1.name:t2.name} за T.`);
    } else {
        log.push(`${t1.name} бан ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        log.push(`${t2.name} бан ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        let p1 = pool.splice(Math.floor(Math.random()*pool.length), 1)[0];
        maps.push({name:p1, t_start: t1.name, ct_start: t2.name}); log.push(`Пик ${t1.name}: ${p1}`);
        let p2 = pool.splice(Math.floor(Math.random()*pool.length), 1)[0];
        maps.push({name:p2, t_start: t2.name, ct_start: t1.name}); log.push(`Пик ${t2.name}: ${p2}`);
        let dec = pool[Math.floor(Math.random()*pool.length)];
        maps.push({name:dec, t_start: t1.name, ct_start: t2.name}); log.push(`Десайдер: ${dec}`);
    }

    activeMatch = { t1, t2, maps, bo, results: [], currentMapIdx: 0, wins1: 0, wins2: 0, veto: log, id: Date.now(), stage };
    db.ref(`matches/${currentTourneyId}/${activeMatch.id}`).set({ id: activeMatch.id, t1: t1.name, p1: t1.power, t2: t2.name, p2: t2.power, total: "0:0", bo, details: [], veto: log, stage });
    document.getElementById("currentSeriesDisplay").style.display = "block";
    renderActiveMatch();
}

function renderActiveMatch() {
    const am = activeMatch; if(!am) return;
    document.getElementById("seriesTitle").innerText = `${am.t1.name} vs ${am.t2.name} [${am.wins1}:${am.wins2}]`;
    document.getElementById("vetoLogLive").innerHTML = "<b>Veto Log:</b><br>" + am.veto.join("<br>");
    let cur = am.maps[am.currentMapIdx];
    document.getElementById("mapControls").innerHTML = `
        <p>Карта: <b style="color:var(--accent)">${cur.name}</b></p>
        <button onclick="playNextMap()">Вся карта сразу</button>
        <button onclick="playOneRound()" class="btn-step" style="margin-left:10px;">+1 Раунд</button>
    `;
}

function playNextMap() {
    let am = activeMatch, mObj = am.maps[am.currentMapIdx];
    let s = { r1:0, r2:0, l1:0, l2:0, r:0, h:[], m1: 800, m2: 800, t1T: (mObj.t_start === am.t1.name) };
    
    for(let i=0; i<65; i++) {
        s = conductRound(am.t1, am.t2, mObj, s);
        if((s.r1===13 && s.r2<12) || (s.r2===13 && s.r1<12)) break;
        if(s.r1>=12 && s.r2>=12){ 
            let lim=16; while(s.r1>lim-1 && s.r2>lim-1) lim+=3; 
            if((s.r1===lim && Math.abs(s.r1-s.r2)>=2) || (s.r2===lim && Math.abs(s.r2-s.r1)>=2)) break; 
        }
    }
    
    am.results.push({ name: mObj.name, score: `${s.r1}:${s.r2}`, rounds: s.h, t_start: mObj.t_start, ct_start: mObj.ct_start, sideBonus: MAP_DATA[mObj.name].side, bonus: MAP_DATA[mObj.name].bonus });
    if(s.r1 > s.r2) am.wins1++; else am.wins2++;
    am.currentMapIdx++;
    db.ref(`matches/${currentTourneyId}/${am.id}`).update({ total: `${am.wins1}:${am.wins2}`, details: am.results });
    if(am.wins1 >= Math.ceil(am.bo/2) || am.wins2 >= Math.ceil(am.bo/2)) { activeMatch = null; document.getElementById("currentSeriesDisplay").style.display="none"; } 
    else renderActiveMatch();
}

function renderHistory() {
    document.getElementById("matchHistory").innerHTML = matches.map(m => `
        <div class="match-card">
            <div class="match-stage">${m.stage || 'Match'}</div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span><b>${m.t1}</b> vs <b>${m.t2}</b></span>
                <b style="color:var(--accent); font-size:1.5em;">${m.total}</b>
            </div>
            ${(m.details || []).map(d => `
                <div class="map-row">
                    <div style="display:flex; justify-content:space-between; border-bottom:1px solid #333; padding-bottom:5px; margin-bottom:10px;">
                        <b style="color:var(--info)">${d.name}</b> <b>${d.score}</b>
                    </div>
                    <div class="round-history">${d.rounds.join(" ")}</div>
                </div>
            `).join("")}
        </div>`).join("");
}

checkState();
</script>
