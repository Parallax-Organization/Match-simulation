<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ESPORTS MANAGER v4.15 PRO</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
    :root { --bg: #0f111a; --card: #161925; --text: #e0e0e0; --accent: #00ff41; --danger: #ff4b2b; --info: #00b4ff; --t-color: #ff9800; --ct-color: #4a90e2; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.4; }
    .container { max-width: 900px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #2d334a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    h1 { color: var(--accent); margin: 0; text-align: center; letter-spacing: 2px; text-transform: uppercase; font-size: 2em; }
    .sub-title { color: var(--info); text-align: center; font-weight: bold; letter-spacing: 5px; margin-bottom: 25px; font-size: 0.8em; }

    .changelog-container { background: #0a0c14; border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 30px; border-left: 4px solid var(--accent); }
    .changelog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .nav-btns { display: flex; gap: 10px; }
    .nav-btn { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; background: #1f2335; border: 1px solid #414868; border-radius: 50%; cursor: pointer; color: var(--accent); transition: 0.3s; font-weight: bold; font-size: 18px; }
    .nav-btn:hover { background: var(--accent); color: #000; }
    .changelog-content { font-size: 13px; color: #ccc; }
    .changelog-content ul { padding-left: 18px; margin: 8px 0; }
    .ver-title { color: var(--info); font-weight: bold; font-size: 1.1em; }

    input, select { background: #1f2335; border: 1px solid #414868; color: white; padding: 12px; border-radius: 8px; margin: 5px; font-size: 14px; }
    button { background: var(--accent); color: #000; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
    button:hover { filter: brightness(1.2); transform: translateY(-1px); }
    
    .tourney-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
    .tourney-card { background: #1f2335; padding: 20px; border-radius: 12px; border: 1px solid #333; text-align: center; cursor: pointer; transition: 0.3s; position: relative; }
    .tourney-card:hover { border-color: var(--accent); transform: scale(1.02); }
    .tourney-card.finished { opacity: 0.8; border-color: #444; background: #111; }
    .status-badge { font-size: 10px; text-transform: uppercase; padding: 2px 8px; border-radius: 10px; margin-bottom: 10px; display: inline-block; }
    .status-active { background: rgba(0, 255, 65, 0.2); color: var(--accent); }
    .status-finished { background: rgba(255, 75, 43, 0.2); color: var(--danger); }

    .team-item { display: flex; justify-content: space-between; background: #1f2335; padding: 12px; margin: 8px 0; border-radius: 8px; border-left: 4px solid var(--info); }
    .match-card { background: #1f2335; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-left: 5px solid var(--accent); position: relative; }
    .match-stage { position: absolute; top: -10px; left: 20px; background: var(--accent); color: #000; padding: 2px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; }
    
    .map-row { background: rgba(0,0,0,0.3); padding: 15px; margin: 15px 0; border-radius: 10px; border: 1px solid #333; }
    .round-history { font-family: 'Courier New', monospace; background: #050505; padding: 15px; border-radius: 8px; margin-top: 10px; line-height: 1.8; font-size: 13px; }
    .r-t { color: var(--t-color); font-weight: bold; }
    .r-ct { color: var(--ct-color); font-weight: bold; }

    .badge { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-right: 8px; display: inline-block; }
    .badge-t { background: var(--t-color); color: white; }
    .badge-ct { background: var(--ct-color); color: white; }
    
    .veto-box { background: #0a0c14; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; margin-top: 15px; color: #888; border: 1px dashed #444; }
    .toggle-veto { color: var(--info); cursor: pointer; font-size: 12px; text-decoration: underline; margin-top: 15px; display: block; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #0a0c14; padding: 10px 20px; border-radius: 10px; border-bottom: 2px solid #222; }
</style>
</head>
<body>

<div class="container">
    <div id="authSection">
        <h1>ESPORTS MANAGER</h1>
        <div class="sub-title">VERSION 4.15 PRO</div>
        <div class="changelog-container">
            <div class="changelog-header">
                <span id="verTitle" class="ver-title"></span>
                <div class="nav-btns">
                    <span class="nav-btn" onclick="changeLog(-1)">←</span>
                    <span class="nav-btn" onclick="changeLog(1)">→</span>
                </div>
            </div>
            <div id="changelogContent" class="changelog-content"></div>
        </div>
        <div style="text-align: center;">
            <input type="password" id="pass" placeholder="Пароль администратора">
            <div style="margin-top: 20px;">
                <button onclick="auth(true)">Панель управления</button>
                <button onclick="auth(false)" style="background: #414868; color: white;">Просмотр результатов</button>
            </div>
        </div>
    </div>

    <div id="tourneySection" style="display:none;">
        <button onclick="logout()" style="float:right; background:#444; color:white;">Выход</button>
        <h2>Выберите турнир</h2>
        <div id="adminTourneyCreate" style="display:none; margin-bottom:20px;">
            <input type="text" id="newTourneyName" placeholder="Название турнира">
            <button onclick="createTourney()">Создать турнир</button>
        </div>
        <div id="tourneyList" class="tourney-grid"></div>
    </div>

    <div id="mainPanel" style="display:none;">
        <div class="top-bar">
            <div>Турнир: <b id="activeTourneyName" style="color:var(--accent)"></b></div>
            <div id="tourneyStatusArea"></div>
            <div>
                <button onclick="exitTourney()" style="background:#444; color:white; padding: 5px 10px; font-size:11px;">К списку</button>
                <button onclick="logout()" style="background:var(--danger); color:white; padding: 5px 10px; font-size:11px;">Logout</button>
            </div>
        </div>
        <div id="adminContent" style="display:none;">
            <button onclick="finishTourney()" style="background:var(--danger); color:white; font-size:11px; margin-bottom:10px;">Завершить турнир</button>
            <div class="match-card">
                <h3>Команды турнира</h3>
                <input type="text" id="tName" placeholder="Название"><input type="number" id="tPower" placeholder="Сила">
                <button onclick="addTeam()">Добавить</button>
                <div id="teamsDisplay" style="margin-top:10px;"></div>
            </div>
            <div class="match-card">
                <h3>Создать матч</h3>
                <input type="text" id="matchStageName" placeholder="Стадия матча">
                <br>
                <select id="sel1"></select> VS <select id="sel2"></select>
                <select id="bo"><option value="1">Bo1</option><option value="3">Bo3</option><option value="5">Bo5</option></select>
                <button onclick="startVeto()" style="background:var(--info); color:white;">Начать Veto</button>
            </div>
            <div id="currentSeriesDisplay" style="display:none;" class="match-card">
                <h2 id="seriesTitle"></h2>
                <div id="vetoLogLive" class="veto-box" style="color:#eee;"></div>
                <div id="mapControls" style="text-align:center; margin-top:15px;"></div>
            </div>
        </div>
        <div id="matchHistory"></div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDaZmAmodUvLKcPSJ85SImjtBKdAIUUd_s",
  authDomain: "match-simulation.firebaseapp.com",
  databaseURL: "https://match-simulation-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "match-simulation",
  storageBucket: "match-simulation.firebasestorage.app",
  messagingSenderId: "991337782669",
  appId: "1:991337782669:web:addc6ead3cdc08baab71c4"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const MAP_DATA = { "Mirage": { bonus: 1.5, side: "CT" }, "Inferno": { bonus: 2.8, side: "CT" }, "Nuke": { bonus: 3.5, side: "CT" }, "Ancient": { bonus: 2.2, side: "CT" }, "Anubis": { bonus: 2.0, side: "T" }, "Dust2": { bonus: 0.7, side: "T" }, "Vertigo": { bonus: 1.2, side: "CT" } };
const MAP_POOL = Object.keys(MAP_DATA);

const UPDATES = [
    { v: "4.15", items: ["Интеграция бонусов карт напрямую в шанс победы в раунде.", "Улучшена сортировка турниров: свежие завершенные теперь выше старых.", "Исправлен визуальный баг отображения сторон в Veto при ножевом раунде.", "Полное восстановление истории Changelog с v4.9."] },
    { v: "4.14", items: ["Исправлен Veto Log для всех форматов: Bo1, Bo3, Bo5.", "В Bo1 возвращена информация о случайном выборе сторон.", "В Bo5 теперь корректно отображаются пики сторон и ножевой раунд.", "Сохранены цветовые индикаторы бонусов карт.", "Полная изоляция команд внутри турниров."] },
    { v: "4.13", items: ["Команды теперь уникальны для каждого турнира.", "Bo3 Veto: Бан-Бан, Пик-Пик, Бан-Бан, Десайдер.", "Вернули бонусы сторон с цветовой подсветкой."] },
    { v: "4.12", items: ["Anti-322: Удаление матчей запрещено.", "Статусы турниров: Идёт/Завершён.", "Названия стадий матчей (Финал, Полуфинал).", "Улучшен дизайн стрелок и навигации."] },
    { v: "4.11", items: ["Система вкладок (Турниров).", "Матчи не пересекаются между турнирами.", "Сохранение текущего турнира при обновлении страницы."] },
    { v: "4.10", items: ["Система MR12 и овертаймы каждые 3 раунда.", "Ножевой раунд на десайдере.", "Расширенное Veto для Bo5."] },
    { v: "4.9", items: ["Исправление бага Bo5 (счет 2:1).", "Кнопка Показать/Скрыть Veto в истории."] }
];

let currentLogIdx = 0, teams = [], tournaments = [], matches = [], activeMatch = null;
let currentRole = sessionStorage.getItem("es_role"), currentTourneyId = localStorage.getItem("es_tourney_id");

function changeLog(dir) { currentLogIdx = (currentLogIdx + dir + UPDATES.length) % UPDATES.length; renderLog(); }
function renderLog() {
    const up = UPDATES[currentLogIdx];
    document.getElementById("verTitle").innerText = "Версия " + up.v;
    document.getElementById("changelogContent").innerHTML = `<ul>${up.items.map(i => `<li>${i}</li>`).join("")}</ul>`;
}
renderLog();

function auth(isAdmin) {
    if(isAdmin && document.getElementById("pass").value !== "1234") return alert("Доступ запрещен!");
    currentRole = isAdmin ? "admin" : "viewer";
    sessionStorage.setItem("es_role", currentRole);
    checkState();
}
function logout() { sessionStorage.clear(); localStorage.clear(); location.reload(); }
function exitTourney() { localStorage.removeItem("es_tourney_id"); currentTourneyId = null; checkState(); }

function checkState() {
    document.getElementById("authSection").style.display = !currentRole ? "block" : "none";
    if(currentRole) {
        if(!currentTourneyId) {
            document.getElementById("tourneySection").style.display = "block";
            document.getElementById("mainPanel").style.display = "none";
            document.getElementById("adminTourneyCreate").style.display = currentRole === "admin" ? "block" : "none";
            loadTournaments();
        } else {
            document.getElementById("tourneySection").style.display = "none";
            document.getElementById("mainPanel").style.display = "block";
            document.getElementById("adminContent").style.display = currentRole === "admin" ? "block" : "none";
            loadTourneyData();
        }
    }
}

function loadTournaments() {
    db.ref("tournaments").on("value", s => {
        const val = s.val() || {};
        tournaments = Object.keys(val).map(id => ({ id, ...val[id] }));
        // Улучшенная сортировка v4.15: Активные сверху, завершенные ниже по убыванию ID (времени)
        tournaments.sort((a,b) => {
            if (a.status === 'active' && b.status !== 'active') return -1;
            if (a.status !== 'active' && b.status === 'active') return 1;
            return b.id - a.id; 
        });
        document.getElementById("tourneyList").innerHTML = tournaments.map(t => `
            <div class="tourney-card ${t.status === 'finished' ? 'finished' : ''}" onclick="selectTourney('${t.id}')">
                <span class="status-badge ${t.status === 'active' ? 'status-active' : 'status-finished'}">${t.status === 'active' ? '• Идёт' : '✓ Завершён'}</span>
                <br><b>${t.name}</b>
                ${currentRole === 'admin' ? `<br><small style="color:red" onclick="event.stopPropagation(); deleteTourney('${t.id}')">[ Удалить ]</small>` : ''}
            </div>`).join("");
    });
}
function createTourney() { const n = document.getElementById("newTourneyName").value.trim(); if(n) db.ref("tournaments").push({ name: n, status: "active", id: Date.now() }); }
function deleteTourney(id) { if(confirm("Удалить всё?")) { db.ref("tournaments/"+id).remove(); db.ref("matches/"+id).remove(); db.ref("teams/"+id).remove(); } }
function selectTourney(id) { currentTourneyId = id; localStorage.setItem("es_tourney_id", id); checkState(); }
function finishTourney() { if(confirm("Завершить турнир?")) db.ref("tournaments/" + currentTourneyId).update({ status: "finished" }); }

function loadTourneyData() {
    db.ref("tournaments/" + currentTourneyId).on("value", s => {
        const t = s.val(); if(!t) return exitTourney();
        document.getElementById("activeTourneyName").innerText = t.name;
        document.getElementById("tourneyStatusArea").innerHTML = t.status === 'active' ? '<span style="color:var(--accent)">[ Активен ]</span>' : '<span style="color:var(--danger)">[ Завершён ]</span>';
    });
    db.ref("teams/" + currentTourneyId).on("value", s => { teams = s.val() || []; updateSelectors(); });
    db.ref("matches/" + currentTourneyId).on("value", s => { matches = Object.values(s.val() || {}).reverse(); renderHistory(); });
}

function updateSelectors() {
    const d = document.getElementById("teamsDisplay");
    if(d) d.innerHTML = teams.map((t,i)=>`<div class="team-item"><span>${t.name} (${t.power})</span><b onclick="deleteTeam(${i})" style="color:red;cursor:pointer;">X</b></div>`).join("");
    const s1 = document.getElementById("sel1"), s2 = document.getElementById("sel2");
    if(s1 && s2) { s1.innerHTML=""; s2.innerHTML=""; teams.forEach((t,i)=>{ s1.add(new Option(t.name,i)); s2.add(new Option(t.name,i)); }); }
}
function addTeam() { 
    let n = document.getElementById("tName"), p = document.getElementById("tPower"); 
    if(n.value && p.value) { teams.push({ name: n.value, power: parseInt(p.value) }); db.ref("teams/" + currentTourneyId).set(teams); n.value=""; p.value=""; } 
}
function deleteTeam(i) { teams.splice(i,1); db.ref("teams/" + currentTourneyId).set(teams); }

// --- VETO v4.15 ---
function startVeto() {
    let i1 = document.getElementById("sel1").value, i2 = document.getElementById("sel2").value, bo = parseInt(document.getElementById("bo").value), stage = document.getElementById("matchStageName").value.trim();
    if(i1===i2) return alert("Выберите разные команды");
    let t1 = teams[i1], t2 = teams[i2], pool = [...MAP_POOL], log = [], maps = [];
    const getS = (m, chooser, other) => (MAP_DATA[m].side === "CT" ? {t:other.name, ct:chooser.name} : {t:chooser.name, ct:other.name});

    if(bo == 1) {
        for(let i=0; i<6; i++) log.push(`${(i%2==0?t1.name:t2.name)} забанил ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        let rSide = Math.random()>0.5; maps.push({name:pool[0], t_start: rSide?t1.name:t2.name, ct_start: rSide?t2.name:t1.name});
        log.push(`Финальная карта: ${pool[0]}. Стороны: ${rSide ? t1.name : t2.name} за T.`);
    } else if(bo == 3) {
        log.push(`${t1.name} забанил ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        log.push(`${t2.name} забанил ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        let p1 = pool.splice(Math.floor(Math.random()*pool.length), 1)[0];
        let s1 = getS(p1, t2, t1); maps.push({name:p1, t_start: s1.t, ct_start: s1.ct});
        log.push(`[Карта 1] ${t1.name} пикнул ${p1}. ${t2.name} выбрал ${s1.ct === t2.name ? 'CT' : 'T'}`);
        let p2 = pool.splice(Math.floor(Math.random()*pool.length), 1)[0];
        let s2 = getS(p2, t1, t2); maps.push({name:p2, t_start: s2.t, ct_start: s2.ct});
        log.push(`[Карта 2] ${t2.name} пикнул ${p2}. ${t1.name} выбрал ${s2.ct === t1.name ? 'CT' : 'T'}`);
        log.push(`${t1.name} забанил ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        log.push(`${t2.name} забанил ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        let dec = pool[0]; let kwId = Math.random()>0.5; let kw = kwId?t1.name:t2.name; 
        let strongSide = MAP_DATA[dec].side;
        let side = Math.random()>0.5; // true = T, false = CT
        maps.push({name:dec, t_start: side?t1.name:t2.name, ct_start: side?t2.name:t1.name});
        // Фикс отображения v4.15
        let chosenSide = (side && kw === t1.name) || (!side && kw === t2.name) ? 'T' : 'CT';
        log.push(`[Десайдер] ${dec}. Ножи выиграл ${kw}, выбрана ${chosenSide} сторона.`);
    } else {
        log.push(`${t1.name} забанил ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        log.push(`${t2.name} забанил ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        for(let k=1; k<=4; k++){
            let p = pool.splice(Math.floor(Math.random()*pool.length), 1)[0];
            let chooser = (k==1||k==3)?t1:t2; let other = (k==1||k==3)?t2:t1;
            let s = getS(p, other, chooser); maps.push({name:p, t_start: s.t, ct_start: s.ct});
            log.push(`[Карта ${k}] ${chooser.name} пикнул ${p}. ${other.name} выбрал ${s.ct===other.name?'CT':'T'}`);
        }
        let dec = pool[0]; let kw = Math.random()>0.5?t1.name:t2.name; let side = Math.random()>0.5;
        maps.push({name:dec, t_start: side?t1.name:t2.name, ct_start: side?t2.name:t1.name});
        let chosenSide = (side && kw === t1.name) || (!side && kw === t2.name) ? 'T' : 'CT';
        log.push(`[Десайдер] ${dec}. Ножи выиграл ${kw}, выбрана ${chosenSide} сторона.`);
    }
    activeMatch = { t1, t2, maps, bo, results: [], currentMapIdx: 0, wins1: 0, wins2: 0, veto: log, id: Date.now(), stage };
    db.ref(`matches/${currentTourneyId}/${activeMatch.id}`).set({ id: activeMatch.id, t1: t1.name, p1: t1.power, t2: t2.name, p2: t2.power, total: "0:0", bo, details: [], veto: log, stage });
    document.getElementById("currentSeriesDisplay").style.display = "block";
    renderActiveMatch();
}

function renderActiveMatch() {
    const am = activeMatch; if(!am) return;
    document.getElementById("seriesTitle").innerText = `${am.t1.name} vs ${am.t2.name} [${am.wins1}:${am.wins2}]`;
    document.getElementById("vetoLogLive").innerHTML = "<b>Veto Log:</b><br>" + am.veto.join("<br>");
    let cur = am.maps[am.currentMapIdx];
    document.getElementById("mapControls").innerHTML = `<p>Карта: <b>${cur.name}</b></p><button onclick="playNextMap()">Симулировать карту</button>`;
}

function playNextMap() {
    let am = activeMatch, mObj = am.maps[am.currentMapIdx];
    let res = simulateMap(am.t1, am.t2, mObj);
    am.results.push({ name: mObj.name, score: `${res.r1}:${res.r2}`, rounds: res.history_styled, t_start: mObj.t_start, ct_start: mObj.ct_start, sideBonus: MAP_DATA[mObj.name].side, bonus: MAP_DATA[mObj.name].bonus });
    if(res.r1 > res.r2) am.wins1++; else am.wins2++;
    am.currentMapIdx++;
    db.ref(`matches/${currentTourneyId}/${am.id}`).update({ total: `${am.wins1}:${am.wins2}`, details: am.results });
    if(am.wins1 >= Math.ceil(am.bo/2) || am.wins2 >= Math.ceil(am.bo/2)) { activeMatch = null; document.getElementById("currentSeriesDisplay").style.display="none"; } 
    else renderActiveMatch();
}

function simulateMap(t1, t2, m) {
    let r1=0, r2=0, l1=0, l2=0, h=[]; 
    let b = MAP_DATA[m.name].bonus; 
    let sideStrong = MAP_DATA[m.name].side;
    let t1T = (m.t_start === t1.name);

    for(let r=0; r<65; r++){
        let t1IsT = (r < 12) ? t1T : !t1T; 
        if(r >= 24) t1IsT = (Math.floor((r-24)/3) % 2 === 0) ? t1T : !t1T;

        let c1 = (t1.power / (t1.power + t2.power)) * 100;
        // Математика бонусов v4.15
        if (sideStrong === "CT") {
            if (!t1IsT) c1 += b; else c1 -= b; 
        } else {
            if (t1IsT) c1 += b; else c1 -= b;
        }

        c1 -= (l1 * 3.2); c1 += (l2 * 3.2);

        if(Math.random() * 100 < c1) { r1++; l1=0; l2 = Math.min(l2+1, 4); } 
        else { r2++; l2=0; l1 = Math.min(l1+1, 4); }
        
        h.push(`<span class="${t1IsT?'r-t':'r-ct'}">${r1}</span>:<span class="${t1IsT?'r-ct':'r-t'}">${r2}</span>`);
        if(r===12||(r>=24&&(r-24)%3===0)) h.push("<br>");
        if((r1===13&&r2<12)||(r2===13&&r1<12)) break;
        if(r1>=12&&r2>=12){ let lim=16; while(r1>lim-1&&r2>lim-1) lim+=3; if((r1===lim&&Math.abs(r1-r2)>=2)||(r2===lim&&Math.abs(r2-r1)>=2)) break; }
    }
    return {r1, r2, history_styled: h};
}

function renderHistory() {
    document.getElementById("matchHistory").innerHTML = matches.map(m => `
        <div class="match-card">
            ${m.stage ? `<div class="match-stage">${m.stage}</div>` : ''}
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span><b>${m.t1}</b> vs <b>${m.t2}</b> <small>Bo${m.bo}</small></span>
                <b style="color:var(--accent); font-size:1.5em;">${m.total}</b>
            </div>
            ${(m.details || []).map(d => `
                <div class="map-row">
                    <div style="display:flex; justify-content:space-between"><b>📍 ${d.name}</b> <b style="color:var(--accent)">${d.score}</b></div>
                    <div style="margin:5px 0; font-size:11px;">
                        <span class="badge badge-t">T: ${d.t_start}</span><span class="badge badge-ct">CT: ${d.ct_start}</span>
                        <span class="badge" style="background:#333">Bonus: <span style="color:${d.sideBonus==='CT'?'var(--ct-color)':'var(--t-color)'}">${d.sideBonus}</span> (+${d.bonus}%)</span>
                    </div>
                    <div class="round-history">${d.rounds.join(" ")}</div>
                </div>
            `).join("")}
            <span class="toggle-veto" onclick="let b=this.nextElementSibling; b.style.display=b.style.display==='none'?'block':'none'">[ Показать Veto Log ]</span>
            <div class="veto-box" style="display:none">${m.veto.join("<br>")}</div>
        </div>`).join("");
}
checkState();
</script>
</body>
