<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Esports Manager Pro - Advanced Match Simulation System">
<meta name="version" content="4.17.2">
<meta name="author" content="Gemini AI Collaboration">
<title>MATCH SIMULATION v4.17.2 PRO</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
    /* GLOBAL THEME DEFINITIONS */
    :root { 
        --bg: #0f111a; 
        --card: #161925; 
        --text: #e0e0e0; 
        --accent: #00ff41; 
        --danger: #ff4b2b; 
        --info: #00b4ff; 
        --t-color: #ff9800; 
        --ct-color: #4a90e2; 
        --shadow: 0 15px 45px rgba(0,0,0,0.7);
        --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* ANIMATIONS */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0,255,65,0.4); } 70% { box-shadow: 0 0 0 10px rgba(0,255,65,0); } 100% { box-shadow: 0 0 0 0 rgba(0,255,65,0); } }

    body { 
        font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; 
        background: var(--bg); 
        color: var(--text); 
        margin: 0; 
        padding: 20px; 
        line-height: 1.6; 
        overflow-x: hidden;
    }

    .container { 
        max-width: 950px; 
        margin: 20px auto; 
        background: var(--card); 
        padding: 40px; 
        border-radius: 24px; 
        border: 1px solid rgba(255,255,255,0.08); 
        box-shadow: var(--shadow); 
        animation: fadeIn 0.6s ease-out;
    }
    
    h1 { 
        color: var(--accent); 
        margin: 0; 
        text-align: center; 
        letter-spacing: 5px; 
        text-transform: uppercase; 
        font-size: 2.5em; 
        font-weight: 900;
        text-shadow: 0 0 20px rgba(0,255,65,0.2);
    }
    
    .sub-title { 
        color: var(--info); 
        text-align: center; 
        font-weight: bold; 
        letter-spacing: 8px; 
        margin-bottom: 35px; 
        font-size: 0.9em; 
        text-transform: uppercase;
        opacity: 0.7;
    }

    /* CHANGELOG MODULE STYLING */
    .changelog-container { 
        background: linear-gradient(145deg, #0a0c14, #121520); 
        border: 1px solid #2d334a; 
        padding: 25px; 
        border-radius: 18px; 
        margin-bottom: 40px; 
        border-left: 6px solid var(--accent); 
        position: relative;
    }
    
    .changelog-header { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        margin-bottom: 20px; 
    }
    
    .nav-btns { display: flex; gap: 15px; }
    
    .nav-btn { 
        width: 42px; 
        height: 42px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        background: #1f2335; 
        border: 1px solid #414868; 
        border-radius: 12px; 
        cursor: pointer; 
        color: var(--accent); 
        transition: var(--transition); 
        font-weight: bold; 
        font-size: 22px; 
    }
    
    .nav-btn:hover { 
        background: var(--accent); 
        color: #000; 
        transform: scale(1.05) rotate(5deg);
    }
    
    .changelog-content { font-size: 14px; color: #a0a0a0; }
    .changelog-content ul { padding-left: 25px; margin: 12px 0; list-style-type: square; }
    .changelog-content li { margin-bottom: 7px; }
    .ver-title { color: var(--info); font-weight: 800; font-size: 1.3em; text-transform: uppercase; }

    /* FORM COMPONENTS */
    input, select { 
        background: #1f2335; 
        border: 2px solid #2d334a; 
        color: white; 
        padding: 14px 18px; 
        border-radius: 12px; 
        margin: 8px; 
        font-size: 14px; 
        outline: none;
        transition: var(--transition);
    }
    
    input:focus, select:focus { border-color: var(--info); background: #252a3f; }
    
    button { 
        background: var(--accent); 
        color: #000; 
        border: none; 
        padding: 14px 30px; 
        border-radius: 12px; 
        cursor: pointer; 
        font-weight: 900; 
        text-transform: uppercase; 
        transition: var(--transition); 
        box-shadow: 0 4px 0px rgba(0,0,0,0.2);
    }
    
    button:hover { 
        filter: brightness(1.15); 
        transform: translateY(-3px); 
        box-shadow: 0 8px 20px rgba(0,255,65,0.25);
    }
    
    button:active { transform: translateY(-1px); }

    /* TOURNAMENT INTERFACE */
    .tourney-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
        gap: 20px; 
        margin-top: 30px; 
    }
    
    .tourney-card { 
        background: linear-gradient(135deg, #1f2335, #161925); 
        padding: 30px; 
        border-radius: 20px; 
        border: 1px solid #2d334a; 
        text-align: center; 
        cursor: pointer; 
        transition: var(--transition); 
        position: relative; 
    }
    
    .tourney-card:hover { 
        border-color: var(--accent); 
        transform: translateY(-8px); 
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    
    .tourney-card.finished { 
        opacity: 0.7; 
        filter: grayscale(0.4);
        background: #0d1017;
    }
    
    .status-badge { 
        font-size: 10px; 
        text-transform: uppercase; 
        padding: 4px 12px; 
        border-radius: 20px; 
        margin-bottom: 15px; 
        display: inline-block; 
        font-weight: 800;
        letter-spacing: 1px;
    }
    
    .status-active { background: rgba(0, 255, 65, 0.1); color: var(--accent); border: 1px solid var(--accent); animation: pulse 2s infinite; }
    .status-finished { background: rgba(255, 75, 43, 0.1); color: var(--danger); border: 1px solid var(--danger); }

    /* MATCH STYLES */
    .team-item { 
        display: flex; 
        justify-content: space-between; 
        background: rgba(255,255,255,0.03); 
        padding: 16px; 
        margin: 12px 0; 
        border-radius: 14px; 
        border-left: 5px solid var(--info); 
        transition: 0.2s;
    }
    
    .team-item:hover { background: rgba(255,255,255,0.06); }
    
    .match-card { 
        background: #1f2335; 
        padding: 28px; 
        border-radius: 20px; 
        margin-bottom: 30px; 
        border-left: 8px solid var(--accent); 
        position: relative; 
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    
    .match-stage { 
        position: absolute; 
        top: -14px; 
        left: 25px; 
        background: var(--accent); 
        color: #000; 
        padding: 4px 16px; 
        border-radius: 8px; 
        font-size: 11px; 
        font-weight: 900; 
        box-shadow: 0 4px 10px rgba(0,255,65,0.3);
    }
    
    .map-row { 
        background: rgba(0,0,0,0.4); 
        padding: 22px; 
        margin: 22px 0; 
        border-radius: 16px; 
        border: 1px solid #33394d; 
    }
    
    .round-history { 
        font-family: 'Fira Code', 'Cascadia Code', monospace; 
        background: #050505; 
        padding: 20px; 
        border-radius: 12px; 
        margin-top: 15px; 
        line-height: 2.2; 
        font-size: 13px; 
        color: #ddd;
        border: 1px solid #1a1a1a;
    }
    
    .r-t { color: var(--t-color); font-weight: bold; }
    .r-ct { color: var(--ct-color); font-weight: bold; }

    .badge { 
        padding: 6px 14px; 
        border-radius: 7px; 
        font-size: 11px; 
        font-weight: 800; 
        margin-right: 12px; 
        display: inline-block; 
        text-transform: uppercase;
    }
    
    .badge-t { background: var(--t-color); color: white; }
    .badge-ct { background: var(--ct-color); color: white; }
    
    .veto-box { 
        background: #080a0f; 
        padding: 20px; 
        border-radius: 12px; 
        font-family: 'JetBrains Mono', monospace; 
        font-size: 13px; 
        margin-top: 20px; 
        color: #94a3b8; 
        border: 1px dashed #334155; 
        line-height: 1.8;
    }
    
    .toggle-veto { 
        color: var(--info); 
        cursor: pointer; 
        font-size: 12px; 
        text-decoration: underline; 
        margin-top: 20px; 
        display: block; 
        font-weight: 600;
    }
    
    .top-bar { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        margin-bottom: 30px; 
        background: #0a0c14; 
        padding: 15px 30px; 
        border-radius: 16px; 
        border: 1px solid #2d334a; 
    }
</style>
</head>
<body>

<div class="container">
    <div id="authSection">
        <h1>MATCH SIMULATION</h1>
        <div class="sub-title">VERSION 4.17.2 PRO</div>
        
        <div class="changelog-container">
            <div class="changelog-header">
                <span id="verTitle" class="ver-title"></span>
                <div class="nav-btns">
                    <span class="nav-btn" onclick="changeLog(-1)">←</span>
                    <span class="nav-btn" onclick="changeLog(1)">→</span>
                </div>
            </div>
            <div id="changelogContent" class="changelog-content"></div>
        </div>
        
        <div style="text-align: center; background: rgba(255,255,255,0.02); padding: 30px; border-radius: 20px;">
            <input type="password" id="pass" placeholder="Ключ доступа администратора">
            <div style="margin-top: 30px;">
                <button onclick="auth(true)">Панель управления</button>
                <button onclick="auth(false)" style="background: #414868; color: white; margin-left: 10px;">Режим зрителя</button>
            </div>
        </div>
    </div>

    <div id="tourneySection" style="display:none;">
        <button onclick="logout()" style="float:right; background:#333; color:white; font-size:12px;">Выйти из системы</button>
        <h2 style="margin-top:0;">Навигатор турниров</h2>
        
        <div id="adminTourneyCreate" style="display:none; margin-bottom:30px; background: rgba(0,180,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(0,180,255,0.2);">
            <input type="text" id="newTourneyName" placeholder="Название нового ивента">
            <button onclick="createTourney()">Создать турнир</button>
        </div>
        
        <div id="tourneyList" class="tourney-grid"></div>
    </div>

    <div id="mainPanel" style="display:none;">
        <div class="top-bar">
            <div>Текущий ивент: <b id="activeTourneyName" style="color:var(--accent); font-size:1.1em;"></b></div>
            <div id="tourneyStatusArea"></div>
            <div>
                <button onclick="exitTourney()" style="background:#444; color:white; padding: 8px 16px; font-size:11px; border-radius: 8px;">Назад</button>
                <button onclick="logout()" style="background:var(--danger); color:white; padding: 8px 16px; font-size:11px; border-radius: 8px; margin-left:5px;">Выход</button>
            </div>
        </div>
        
        <div id="adminContent" style="display:none;">
            <div style="display:flex; justify-content: flex-end; margin-bottom: 20px;">
                <button onclick="finishTourney()" style="background:var(--danger); color:white; font-size:10px; padding: 6px 12px; letter-spacing:1px;">Архивировать турнир</button>
            </div>
            
            <div class="match-card">
                <h3><span style="color:var(--info)">01.</span> Ростер команд</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: center;">
                    <input type="text" id="tName" placeholder="Имя команды">
                    <input type="number" id="tPower" placeholder="Power Level">
                    <button onclick="addTeam()" style="height: 50px;">Добавить</button>
                </div>
                <div id="teamsDisplay" style="margin-top:20px;"></div>
            </div>
            
            <div class="match-card">
                <h3><span style="color:var(--info)">02.</span> Планировщик матчей</h3>
                <input type="text" id="matchStageName" placeholder="Этап (Группы / Плей-офф / Финал)" style="width: 95%;">
                <br>
                <div style="display: flex; align-items: center; justify-content: center; margin: 15px 0;">
                    <select id="sel1"></select> 
                    <span style="margin: 0 15px; font-weight: 900; color: var(--accent);">VS</span> 
                    <select id="sel2"></select>
                </div>
                <div style="text-align: center;">
                    <select id="bo" style="width: 200px;">
                        <option value="1">Best of 1</option>
                        <option value="3">Best of 3</option>
                        <option value="5">Best of 5</option>
                    </select>
                    <button onclick="startVeto()" style="background:var(--info); color:white; margin-left:10px;">Запустить Veto</button>
                </div>
            </div>
            
            <div id="currentSeriesDisplay" style="display:none;" class="match-card">
                <div class="match-stage" style="background: var(--info);">Live Simulation</div>
                <h2 id="seriesTitle" style="text-align:center; margin: 10px 0 25px 0; font-size: 1.8em;"></h2>
                <div id="vetoLogLive" class="veto-box"></div>
                <div id="mapControls" style="text-align:center; margin-top:25px;"></div>
            </div>
        </div>
        
        <div id="matchHistory"></div>
    </div>
</div>

<script>
/* ========================================================================
   CORE ENGINE JAVASCRIPT - v4.17.1
   ======================================================================== */

// --- FIREBASE CONFIGURATION ---
const firebaseConfig = {
  apiKey: "AIzaSyDaZmAmodUvLKcPSJ85SImjtBKdAIUUd_s",
  authDomain: "match-simulation.firebaseapp.com",
  databaseURL: "https://match-simulation-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "match-simulation",
  storageBucket: "match-simulation.firebasestorage.app",
  messagingSenderId: "991337782669",
  appId: "1:991337782669:web:addc6ead3cdc08baab71c4"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- COMPETITIVE MAP POOL ---
const MAP_DATA = { 
    "Mirage": { bonus: 1.5, side: "CT" }, 
    "Inferno": { bonus: 2.8, side: "CT" }, 
    "Nuke": { bonus: 3.5, side: "CT" }, 
    "Ancient": { bonus: 2.2, side: "CT" }, 
    "Anubis": { bonus: 2.0, side: "T" }, 
    "Dust2": { bonus: 0.7, side: "T" }, 
    "Vertigo": { bonus: 1.2, side: "CT" } 
};
const MAP_POOL = Object.keys(MAP_DATA);

// --- CHANGELOG REPOSITORY ---
const UPDATES = [
    { v: "4.17.2", items: ["Исправление бага с входом для зрителей."]},
    { v: "4.17.1", items: ["Исправление багов."]},
    { v: "4.17", items: ["В историю матчей добавлено отображение силы команд в скобках (m.p1, m.p2).", "Исправлен баг выбора сторон после ножей: теперь победитель всегда выбирает бонусную сторону карты.", "Расширена структура CSS для улучшения визуального восприятия интерфейса.", "Добавлена расширенная документация внутри кода для повышения стабильности."] },
    { v: "4.16", items: ["Исправлен критический баг входа в новые турниры (Conflict ID Fix).", "Улучшена сортировка: новые турниры выше, новые архивные — в начале списка архива.", "Корректировка логики выбора сторон при победе в ножевом раунде."] },
    { v: "4.15", items: ["Интеграция бонусов карт напрямую в шанс победы в раунде.", "Улучшена сортировка турниров (v1).", "Исправлен визуальный баг сторон в Veto."] },
    { v: "4.14", items: ["Исправлен Veto Log для всех форматов.", "В Bo1 возвращена информация о случайном выборе сторон.", "Корректные пики сторон в Bo5."] },
    { v: "4.9-4.13", items: ["Уникальные команды для турниров.", "Система MR12 и овертаймы.", "Анти-322 система.", "Double Elimination (архив)."] }
];

let currentLogIdx = 0, teams = [], tournaments = [], matches = [], activeMatch = null;
let currentRole = sessionStorage.getItem("es_role"), currentTourneyId = localStorage.getItem("es_tourney_id");

// --- NAVIGATION & AUTH ---
function changeLog(dir) { currentLogIdx = (currentLogIdx + dir + UPDATES.length) % UPDATES.length; renderLog(); }
function renderLog() {
    const up = UPDATES[currentLogIdx];
    document.getElementById("verTitle").innerText = "Version " + up.v;
    document.getElementById("changelogContent").innerHTML = `<ul>${up.items.map(i => `<li>${i}</li>`).join("")}</ul>`;
}
renderLog();

function auth(isAdmin) {
    /* =======================================================================
       SECURITY & ACCESS CONTROL v4.18.2
       ======================================================================= */
    const _access_vault = "UEFSQUxMQVgzOTUwUA=="; // Хеш для пароля

    // ПРОВЕРКА ДЛЯ АДМИНИСТРАТОРА
    if (isAdmin === true) {
        let inputPass = document.getElementById("pass").value;
        
        if (btoa(inputPass) === _access_vault) {
            currentRole = "admin";
            sessionStorage.setItem("es_role", "admin");
            checkState();
            console.log("Admin access granted.");
            return; // Успешный вход, выходим из функции
        } else {
            // Если пароль неверный - только тогда выводим ошибку
            return alert("Доступ заблокирован: Неверный ключ.");
        }
    }

    // ЛОГИКА ДЛЯ ЗРИТЕЛЯ (Сработает, если isAdmin === false)
    currentRole = "viewer";
    sessionStorage.setItem("es_role", "viewer");
    checkState();
    console.log("Viewer mode activated.");
}
    

function logout() { sessionStorage.clear(); localStorage.clear(); location.reload(); }
function exitTourney() { localStorage.removeItem("es_tourney_id"); currentTourneyId = null; checkState(); }

function checkState() {
    const authUI = document.getElementById("authSection"), tourneyUI = document.getElementById("tourneySection"), mainUI = document.getElementById("mainPanel"), adminUI = document.getElementById("adminContent");
    authUI.style.display = !currentRole ? "block" : "none";
    if(currentRole) {
        if(!currentTourneyId) {
            tourneyUI.style.display = "block";
            mainUI.style.display = "none";
            document.getElementById("adminTourneyCreate").style.display = currentRole === "admin" ? "block" : "none";
            loadTournaments();
        } else {
            tourneyUI.style.display = "none";
            mainUI.style.display = "block";
            adminUI.style.display = currentRole === "admin" ? "block" : "none";
            loadTourneyData();
        }
    }
}

// --- TOURNAMENT MANAGEMENT ---
function loadTournaments() {
    db.ref("tournaments").on("value", s => {
        const val = s.val() || {};
        const keys = Object.keys(val);
        tournaments = keys.map(k => {
            let t = val[k];
            t.realId = k; 
            t.sortTime = t.id || 0; 
            return t;
        });
        tournaments.sort((a,b) => {
            if (a.status === 'active' && b.status !== 'active') return -1;
            if (a.status !== 'active' && b.status === 'active') return 1;
            return b.sortTime - a.sortTime; 
        });
        document.getElementById("tourneyList").innerHTML = tournaments.map(t => `
            <div class="tourney-card ${t.status === 'finished' ? 'finished' : ''}" onclick="selectTourney('${t.realId}')">
                <span class="status-badge ${t.status === 'active' ? 'status-active' : 'status-finished'}">${t.status === 'active' ? '• Активен' : '✓ В архиве'}</span>
                <br><b style="font-size:1.2em; letter-spacing:1px;">${t.name}</b>
                ${currentRole === 'admin' ? `<br><small style="color:var(--danger); opacity:0.5; margin-top:15px; display:block;" onclick="event.stopPropagation(); deleteTourney('${t.realId}')">[ Удалить ивент ]</small>` : ''}
            </div>`).join("");
    });
}

function createTourney() { 
    const n = document.getElementById("newTourneyName").value.trim(); 
    if(n) db.ref("tournaments").push({ name: n, status: "active", id: Date.now() }); 
    document.getElementById("newTourneyName").value = "";
}

function deleteTourney(id) { 
    if(confirm("Внимание! Это действие удалит всю историю турнира. Подтверждаете?")) { 
        db.ref("tournaments/"+id).remove(); 
        db.ref("matches/"+id).remove(); 
        db.ref("teams/"+id).remove(); 
    } 
}

function selectTourney(id) { currentTourneyId = id; localStorage.setItem("es_tourney_id", id); checkState(); }

function finishTourney() { 
    if(confirm("Перенести турнир в архив? Редактирование станет невозможным.")) {
        db.ref("tournaments/" + currentTourneyId).update({ status: "finished" }); 
    }
}

// --- DATA PROVIDERS ---
function loadTourneyData() {
    db.ref("tournaments/" + currentTourneyId).on("value", s => {
        const t = s.val(); if(!t) return exitTourney();
        document.getElementById("activeTourneyName").innerText = t.name;
        document.getElementById("tourneyStatusArea").innerHTML = t.status === 'active' ? '<span class="status-badge status-active">Online</span>' : '<span class="status-badge status-finished">Offline</span>';
    });
    db.ref("teams/" + currentTourneyId).on("value", s => { teams = s.val() || []; updateSelectors(); });
    db.ref("matches/" + currentTourneyId).on("value", s => { matches = Object.values(s.val() || {}).reverse(); renderHistory(); });
}

function updateSelectors() {
    const d = document.getElementById("teamsDisplay");
    if(d) d.innerHTML = teams.map((t,i)=>`<div class="team-item"><span><b>${t.name}</b> <small style="color:var(--info)">[Power: ${t.power}]</small></span><b onclick="deleteTeam(${i})" style="color:var(--danger);cursor:pointer; font-size:18px;">×</b></div>`).join("");
    const s1 = document.getElementById("sel1"), s2 = document.getElementById("sel2");
    if(s1 && s2) { s1.innerHTML=""; s2.innerHTML=""; teams.forEach((t,i)=>{ s1.add(new Option(t.name,i)); s2.add(new Option(t.name,i)); }); }
}

function addTeam() { 
    let n = document.getElementById("tName"), p = document.getElementById("tPower"); 
    if(n.value && p.value) { teams.push({ name: n.value, power: parseInt(p.value) }); db.ref("teams/" + currentTourneyId).set(teams); n.value=""; p.value=""; } 
}

function deleteTeam(i) { if(confirm("Удалить команду из турнира?")) { teams.splice(i,1); db.ref("teams/" + currentTourneyId).set(teams); } }

// --- VETO ENGINE v4.17 (SMART SIDES) ---
function startVeto() {
    let i1 = document.getElementById("sel1").value, i2 = document.getElementById("sel2").value, bo = parseInt(document.getElementById("bo").value), stage = document.getElementById("matchStageName").value.trim();
    if(i1===i2) return alert("Ошибка: Команды должны быть разными.");
    
    let t1 = teams[i1], t2 = teams[i2], pool = [...MAP_POOL], log = [], maps = [];
    const getS = (m, chooser, other) => (MAP_DATA[m].side === "CT" ? {t:other.name, ct:chooser.name} : {t:chooser.name, ct:other.name});

    if(bo == 1) {
        for(let i=0; i<6; i++) log.push(`${(i%2==0?t1.name:t2.name)} забанил ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        let rSide = Math.random()>0.5; 
        maps.push({name:pool[0], t_start: rSide?t1.name:t2.name, ct_start: rSide?t2.name:t1.name});
        log.push(`Карта матча: ${pool[0]}. ${rSide ? t1.name : t2.name} начинает за атаку (T).`);
    } else if(bo == 3) {
        log.push(`${t1.name} забанил ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        log.push(`${t2.name} забанил ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        let p1 = pool.splice(Math.floor(Math.random()*pool.length), 1)[0];
        let s1 = getS(p1, t2, t1); maps.push({name:p1, t_start: s1.t, ct_start: s1.ct});
        log.push(`[Pick 1] ${t1.name} выбрал ${p1}. ${t2.name} выбрал ${s1.ct === t2.name ? 'CT' : 'T'} сторону.`);
        let p2 = pool.splice(Math.floor(Math.random()*pool.length), 1)[0];
        let s2 = getS(p2, t1, t2); maps.push({name:p2, t_start: s2.t, ct_start: s2.ct});
        log.push(`[Pick 2] ${t2.name} выбрал ${p2}. ${t1.name} выбрал ${s2.ct === t1.name ? 'CT' : 'T'} сторону.`);
        log.push(`${t1.name} забанил ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        log.push(`${t2.name} забанил ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        
        let dec = pool[0]; 
        let kwId = Math.random()>0.5; 
        let kw = kwId?t1.name:t2.name; 
        
        /* FIXED SMART SIDE SELECTION v4.17 */
        let strongSide = MAP_DATA[dec].side;
        let side = (strongSide === "CT") ? (kw === t2.name) : (kw === t1.name);
        maps.push({name:dec, t_start: side?t1.name:t2.name, ct_start: side?t2.name:t1.name});
        log.push(`[Decider] ${dec}. Ножи: ${kw}. Победитель забрал ${strongSide} сторону.`);
    } else {
        log.push(`${t1.name} забанил ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        log.push(`${t2.name} забанил ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        for(let k=1; k<=4; k++){
            let p = pool.splice(Math.floor(Math.random()*pool.length), 1)[0];
            let chooser = (k==1||k==3)?t1:t2; let other = (k==1||k==3)?t2:t1;
            let s = getS(p, other, chooser); maps.push({name:p, t_start: s.t, ct_start: s.ct});
            log.push(`[Pick ${k}] ${chooser.name} выбрал ${p}. ${other.name} за ${s.ct===other.name?'CT':'T'}`);
        }
        let dec = pool[0]; 
        let kw = Math.random()>0.5?t1.name:t2.name; 
        let strongSide = MAP_DATA[dec].side;
        let side = (strongSide === "CT") ? (kw === t2.name) : (kw === t1.name);
        maps.push({name:dec, t_start: side?t1.name:t2.name, ct_start: side?t2.name:t1.name});
        log.push(`[Decider] ${dec}. Ножи: ${kw}. Победитель забрал ${strongSide} сторону.`);
    }

    activeMatch = { t1, t2, maps, bo, results: [], currentMapIdx: 0, wins1: 0, wins2: 0, veto: log, id: Date.now(), stage };
    db.ref(`matches/${currentTourneyId}/${activeMatch.id}`).set({ id: activeMatch.id, t1: t1.name, p1: t1.power, t2: t2.name, p2: t2.power, total: "0:0", bo, details: [], veto: log, stage });
    document.getElementById("currentSeriesDisplay").style.display = "block";
    renderActiveMatch();
}

function renderActiveMatch() {
    const am = activeMatch; if(!am) return;
    document.getElementById("seriesTitle").innerText = `${am.t1.name} vs ${am.t2.name} [${am.wins1}:${am.wins2}]`;
    document.getElementById("vetoLogLive").innerHTML = "<b>Лог предматчевой подготовки:</b><br>" + am.veto.join("<br>");
    let cur = am.maps[am.currentMapIdx];
    document.getElementById("mapControls").innerHTML = `<p style="font-size:1.1em;">Грядущее сражение: <b style="color:var(--accent)">${cur.name}</b></p><button onclick="playNextMap()" style="padding: 18px 40px; font-size: 16px;">Начать симуляцию</button>`;
}

function playNextMap() {
    let am = activeMatch, mObj = am.maps[am.currentMapIdx];
    let res = simulateMap(am.t1, am.t2, mObj);
    am.results.push({ name: mObj.name, score: `${res.r1}:${res.r2}`, rounds: res.history_styled, t_start: mObj.t_start, ct_start: mObj.ct_start, sideBonus: MAP_DATA[mObj.name].side, bonus: MAP_DATA[mObj.name].bonus });
    if(res.r1 > res.r2) am.wins1++; else am.wins2++;
    am.currentMapIdx++;
    db.ref(`matches/${currentTourneyId}/${am.id}`).update({ total: `${am.wins1}:${am.wins2}`, details: am.results });
    if(am.wins1 >= Math.ceil(am.bo/2) || am.wins2 >= Math.ceil(am.bo/2)) { activeMatch = null; document.getElementById("currentSeriesDisplay").style.display="none"; } 
    else renderActiveMatch();
}

function simulateMap(t1, t2, m) {
    let r1=0, r2=0, l1=0, l2=0, h=[]; 
    let b = MAP_DATA[m.name].bonus; 
    let sideStrong = MAP_DATA[m.name].side;
    let t1T = (m.t_start === t1.name);

        for(let r=0; r<65; r++){
        let t1IsT = (r < 12) ? t1T : !t1T; 
        if(r >= 24) t1IsT = (Math.floor((r-24)/3) % 2 === 0) ? t1T : !t1T;
        let c1 = (t1.power / (t1.power + t2.power)) * 100;
        if (sideStrong === "CT") { if (!t1IsT) c1 += b; else c1 -= b; } 
        else { if (t1IsT) c1 += b; else c1 -= b; }
        c1 -= (l1 * 3.2); c1 += (l2 * 3.2);
        if(Math.random() * 100 < c1) { r1++; l1=0; l2 = Math.min(l2+1, 4); } 
        else { r2++; l2=0; l1 = Math.min(l1+1, 4); }
        h.push(`<span class="${t1IsT?'r-t':'r-ct'}">${r1}</span>:<span class="${t1IsT?'r-ct':'r-t'}">${r2}</span>`);
        
        // НОВЫЙ БЛОК: ПРИНУДИТЕЛЬНЫЙ ПЕРЕНОС MR12 (РАУНД 12)
        if(r === 11) { h.push("<br> "); }
        
        if(r===12||(r>=24&&(r-24)%3===0)) h.push("<br>");
        if((r1===13&&r2<12)||(r2===13&&r1<12)) break;
        if(r1>=12&&r2>=12){ let lim=16; while(r1>lim-1&&r2>lim-1) lim+=3; if((r1===lim&&Math.abs(r1-r2)>=2)||(r2===lim&&Math.abs(r2-r1)>=2)) break; }
    }

    /* =======================================================================
       POST-PROCESSOR v4.18 - DATA INTEGRITY & VISUAL CLEANUP
       =======================================================================
       Этот блок сканирует массив истории и удаляет дублирующиеся переносы строк,
       которые могли возникнуть из-за работы старого алгоритма (r===12).
    */
    let final_history = [];
    for(let i = 0; i < h.length; i++) {
        if(h[i].includes("<br>") && final_history[final_history.length - 1]?.includes("<br>")) {
            continue; // Пропускаем лишний перенос, если он уже есть
        }
        final_history.push(h[i]);
    }

    return {r1, r2, history_styled: final_history};
}
    

// --- RENDERING HISTORY (POWER FIXED) ---
function renderHistory() {
    document.getElementById("matchHistory").innerHTML = matches.map(m => `
        <div class="match-card">
            ${m.stage ? `<div class="match-stage">${m.stage}</div>` : ''}
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:1.15em;"><b>${m.t1}</b> (${m.p1}) vs <b>${m.t2}</b> (${m.p2}) <small style="opacity:0.5">Bo${m.bo}</small></span>
                <b style="color:var(--accent); font-size:1.8em; font-family: 'JetBrains Mono';">${m.total}</b>
            </div>
            ${(m.details || []).map(d => `
                <div class="map-row">
                    <div style="display:flex; justify-content:space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom:8px; margin-bottom:12px;">
                        <b style="color:var(--info); letter-spacing:1px;">${d.name}</b> 
                        <b style="color:var(--accent); font-size:1.2em;">${d.score}</b>
                    </div>
                    <div style="margin:10px 0; font-size:11px;">
                        <span class="badge badge-t">Attack: ${d.t_start}</span>
                        <span class="badge badge-ct">Defense: ${d.ct_start}</span>
                        <span class="badge" style="background:#222; border: 1px solid #444; color:#fff;">Side: <span style="color:${d.sideBonus==='CT'?'var(--ct-color)':'var(--t-color)'}">${d.sideBonus}</span> (+${d.bonus}%)</span>
                    </div>
                    <div class="round-history">${d.rounds.join(" ")}</div>
                </div>
            `).join("")}
            <span class="toggle-veto" onclick="let b=this.nextElementSibling; b.style.display=b.style.display==='none'?'block':'none'">[ Просмотреть детализацию Veto ]</span>
            <div class="veto-box" style="display:none">${m.veto.join("<br>")}</div>
        </div>`).join("");
}

// INITIAL STARTUP
checkState();
</script>
