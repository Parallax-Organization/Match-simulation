<style>
    /* ========================================================================
       GLOBAL THEME DEFINITIONS - EXACTLY AS 4.17.3 (NO CHANGES TO ORIGINAL)
       РАСШИРЕННЫЙ ФОРМАТ CSS ДЛЯ УЛУЧШЕНИЯ ЧИТАЕМОСТИ
       ======================================================================== */
    :root { 
        --bg: #0f111a; 
        --card: #161925; 
        --text: #e0e0e0; 
        --accent: #00ff41; 
        --danger: #ff4b2b; 
        --info: #00b4ff; 
        --t-color: #ff9800; 
        --ct-color: #4a90e2; 
        --shadow: 0 15px 45px rgba(0,0,0,0.7);
        --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* ANIMATIONS */
    @keyframes fadeIn { 
        from { opacity: 0; transform: translateY(10px); } 
        to { opacity: 1; transform: translateY(0); } 
    }
    @keyframes pulse { 
        0% { box-shadow: 0 0 0 0 rgba(0,255,65,0.4); } 
        70% { box-shadow: 0 0 0 10px rgba(0,255,65,0); } 
        100% { box-shadow: 0 0 0 0 rgba(0,255,65,0); } 
    }

    body { 
        font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; 
        background: var(--bg); 
        color: var(--text); 
        margin: 0; 
        padding: 20px; 
        line-height: 1.6; 
        overflow-x: hidden;
    }

    .container { 
        max-width: 950px; 
        margin: 20px auto; 
        background: var(--card); 
        padding: 40px; 
        border-radius: 24px; 
        border: 1px solid rgba(255,255,255,0.08); 
        box-shadow: var(--shadow); 
        animation: fadeIn 0.6s ease-out;
    }
    
    h1 { 
        color: var(--accent); 
        margin: 0; 
        text-align: center; 
        letter-spacing: 5px; 
        text-transform: uppercase; 
        font-size: 2.5em; 
        font-weight: 900;
        text-shadow: 0 0 20px rgba(0,255,65,0.2);
    }
    
    .sub-title { 
        color: var(--info); 
        text-align: center; 
        font-weight: bold; 
        letter-spacing: 8px; 
        margin-bottom: 35px; 
        font-size: 0.9em; 
        text-transform: uppercase;
        opacity: 0.7;
    }

    /* ULTRA 5.0+ NEW UI COMPONENTS FOR PLAYERS AND PHASES */
    .player-editor-box {
        background: rgba(0,0,0,0.3);
        border: 1px solid #2d334a;
        padding: 20px;
        border-radius: 15px;
        margin-top: 15px;
        animation: fadeIn 0.4s ease;
    }

    .player-row {
        display: grid;
        grid-template-columns: 2fr 1.5fr 1fr;
        gap: 10px;
        margin-bottom: 10px;
        align-items: center;
    }

    .economy-label {
        font-size: 9px;
        padding: 2px 6px;
        border-radius: 4px;
        font-weight: 900;
        margin-left: 5px;
        text-transform: uppercase;
    }
    .eco-tag { background: var(--danger); color: white; }
    .force-tag { background: var(--info); color: white; }
    .full-tag { background: var(--accent); color: black; }
    .pistol-tag { background: #9b59b6; color: white; }

    .phase-badge {
        font-size: 10px;
        opacity: 0.7;
        margin-left: 10px;
        color: #a0a0a0;
    }

    /* ========================================================================
       VERSION 5.2.0 & 5.4.1 - CSS COMPONENTS FOR DETAILS AND STATS
       ======================================================================== */
    .round-detail-block {
        background: rgba(0,0,0,0.25);
        border: 1px solid #2d334a;
        margin-bottom: 8px;
        border-radius: 8px;
        overflow: hidden;
    }
    
    .round-detail-block summary {
        background: #1a1d29;
        padding: 12px 18px;
        cursor: pointer;
        font-weight: 600;
        font-size: 13px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        list-style: none;
        transition: var(--transition);
        border-left: 4px solid transparent;
    }
    
    .round-detail-block summary::-webkit-details-marker { display: none; }
    
    .round-detail-block summary:hover { background: #222636; }
    
    .round-detail-block[open] summary {
        border-left-color: var(--accent);
        border-bottom: 1px solid #2d334a;
        background: #141720;
    }

    .round-events {
        padding: 15px 18px;
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        font-size: 12px;
        line-height: 1.8;
        color: #b0b5c9;
        background: #0d0f16;
    }

    .event-line {
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .event-kill { font-weight: bold; }
    .event-bomb { color: #ffd700; font-weight: bold; }
    .event-defuse { color: #448aff; font-weight: bold; }
    
    .weapon-icon {
        font-size: 10px;
        background: rgba(255,255,255,0.1);
        padding: 2px 6px;
        border-radius: 4px;
        color: #fff;
    }

    .stats-table-wrapper {
        margin-top: 20px;
        background: #12151f;
        border: 1px solid #2d334a;
        border-radius: 12px;
        overflow: hidden;
        overflow-x: auto;
    }

    .stats-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        text-align: left;
    }

    .stats-table th {
        background: #1a1d29;
        padding: 12px 10px;
        color: var(--info);
        font-weight: 700;
        text-transform: uppercase;
        font-size: 11px;
        border-bottom: 2px solid #2d334a;
    }

    .stats-table td {
        padding: 10px 10px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    
    .stats-table tr:last-child td { border-bottom: none; }
    .stats-table tr:hover { background: rgba(255,255,255,0.02); }
    
    .team-header-row {
        background: rgba(0, 180, 255, 0.08);
        font-weight: bold;
        color: var(--accent);
    }

    /* CHANGELOG MODULE STYLING */
    .changelog-container { 
        background: linear-gradient(145deg, #0a0c14, #121520); 
        border: 1px solid #2d334a; 
        padding: 25px; 
        border-radius: 18px; 
        margin-bottom: 40px; 
        border-left: 6px solid var(--accent); 
        position: relative;
    }
    
    .changelog-header { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        margin-bottom: 20px; 
    }
    
    .nav-btns { 
        display: flex; 
        gap: 15px; 
    }
    
    .nav-btn { 
        width: 42px; 
        height: 42px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        background: #1f2335; 
        border: 1px solid #414868; 
        border-radius: 12px; 
        cursor: pointer; 
        color: var(--accent); 
        transition: var(--transition); 
        font-weight: bold; 
        font-size: 22px; 
    }
    
    .nav-btn:hover { 
        background: var(--accent); 
        color: #000; 
        transform: scale(1.05) rotate(5deg); 
    }
    
    .changelog-content { 
        font-size: 14px; 
        color: #a0a0a0; 
    }
    
    .changelog-content ul { 
        padding-left: 25px; 
        margin: 12px 0; 
        list-style-type: square; 
    }
    
    .changelog-content li { 
        margin-bottom: 7px; 
    }
    
    .ver-title { 
        color: var(--info); 
        font-weight: 800; 
        font-size: 1.3em; 
        text-transform: uppercase; 
    }

    /* FORM COMPONENTS */
    input, select { 
        background: #1f2335; 
        border: 2px solid #2d334a; 
        color: white; 
        padding: 14px 18px; 
        border-radius: 12px; 
        margin: 8px; 
        font-size: 14px; 
        outline: none; 
        transition: var(--transition);
    }
    
    input:focus, select:focus { 
        border-color: var(--info); 
        background: #252a3f; 
    }
    
    button { 
        background: var(--accent); 
        color: #000; 
        border: none; 
        padding: 14px 30px; 
        border-radius: 12px; 
        cursor: pointer; 
        font-weight: 900; 
        text-transform: uppercase; 
        transition: var(--transition); 
        box-shadow: 0 4px 0px rgba(0,0,0,0.2);
    }
    
    button:hover { 
        filter: brightness(1.15); 
        transform: translateY(-3px); 
        box-shadow: 0 8px 20px rgba(0,255,65,0.25); 
    }
    
    button:active { 
        transform: translateY(-1px); 
    }

    /* TOURNAMENT INTERFACE */
    .tourney-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
        gap: 20px; 
        margin-top: 30px; 
    }
    
    .tourney-card { 
        background: linear-gradient(135deg, #1f2335, #161925); 
        padding: 30px; 
        border-radius: 20px; 
        border: 1px solid #2d334a; 
        text-align: center; 
        cursor: pointer; 
        transition: var(--transition); 
        position: relative; 
    }
    
    .tourney-card:hover { 
        border-color: var(--accent); 
        transform: translateY(-8px); 
        box-shadow: 0 10px 30px rgba(0,0,0,0.4); 
    }
    
    .tourney-card.finished { 
        opacity: 0.7; 
        filter: grayscale(0.4); 
        background: #0d1017; 
    }
    
    .status-badge { 
        font-size: 10px; 
        text-transform: uppercase; 
        padding: 4px 12px; 
        border-radius: 20px; 
        margin-bottom: 15px; 
        display: inline-block; 
        font-weight: 800; 
        letter-spacing: 1px;
    }
    
    .status-active { 
        background: rgba(0, 255, 65, 0.1); 
        color: var(--accent); 
        border: 1px solid var(--accent); 
        animation: pulse 2s infinite; 
    }
    
    .status-finished { 
        background: rgba(255, 75, 43, 0.1); 
        color: var(--danger); 
        border: 1px solid var(--danger); 
    }

    /* MATCH STYLES */
    .team-item { 
        display: flex; 
        justify-content: space-between; 
        background: rgba(255,255,255,0.03); 
        padding: 16px; 
        margin: 12px 0; 
        border-radius: 14px; 
        border-left: 5px solid var(--info); 
        transition: 0.2s; 
        cursor: pointer;
    }
    
    .team-item:hover { 
        background: rgba(255,255,255,0.06); 
    }
    
    .match-card { 
        background: #1f2335; 
        padding: 28px; 
        border-radius: 20px; 
        margin-bottom: 30px; 
        border-left: 8px solid var(--accent); 
        position: relative; 
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    
    .match-stage { 
        position: absolute; 
        top: -14px; 
        left: 25px; 
        background: var(--accent); 
        color: #000; 
        padding: 4px 16px; 
        border-radius: 8px; 
        font-size: 11px; 
        font-weight: 900; 
        box-shadow: 0 4px 10px rgba(0,255,65,0.3);
    }
    
    .map-row { 
        background: rgba(0,0,0,0.4); 
        padding: 22px; 
        margin: 22px 0; 
        border-radius: 16px; 
        border: 1px solid #33394d; 
    }
    
    .round-history { 
        background: #050505; 
        padding: 20px; 
        border-radius: 12px; 
        margin-top: 15px; 
        border: 1px solid #1a1a1a; 
        display: flex; 
        flex-direction: column; 
        gap: 5px;
    }
    
    .r-t { color: var(--t-color); font-weight: bold; }
    .r-ct { color: var(--ct-color); font-weight: bold; }

    .badge { 
        padding: 6px 14px; 
        border-radius: 7px; 
        font-size: 11px; 
        font-weight: 800; 
        margin-right: 12px; 
        display: inline-block; 
        text-transform: uppercase; 
    }
    
    .badge-t { background: var(--t-color); color: white; }
    .badge-ct { background: var(--ct-color); color: white; }
    
    .veto-box { 
        background: #080a0f; 
        padding: 20px; 
        border-radius: 12px; 
        font-family: 'JetBrains Mono', monospace; 
        font-size: 13px; 
        margin-top: 20px; 
        color: #94a3b8; 
        border: 1px dashed #334155; 
        line-height: 1.8;
    }
    
    .toggle-veto { 
        color: var(--info); 
        cursor: pointer; 
        font-size: 12px; 
        text-decoration: underline; 
        margin-top: 20px; 
        display: block; 
        font-weight: 600; 
    }
    
    .top-bar { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        margin-bottom: 30px; 
        background: #0a0c14; 
        padding: 15px 30px; 
        border-radius: 16px; 
        border: 1px solid #2d334a; 
    }
    
    .btn-delete-tourney {
        position: absolute; 
        top: 12px; 
        right: 12px; 
        background: var(--danger); 
        color: white; 
        border: none; 
        border-radius: 50%; 
        width: 28px; 
        height: 28px; 
        cursor: pointer; 
        font-weight: bold; 
        font-size: 14px;
        display: flex; 
        align-items: center; 
        justify-content: center; 
        opacity: 0.8; 
        transition: var(--transition);
        z-index: 10;
    }
    
    .btn-delete-tourney:hover { 
        opacity: 1; 
        transform: scale(1.1); 
        box-shadow: 0 0 10px rgba(255, 75, 43, 0.5); 
    }

    .econ-summary {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        opacity: 0.8;
        background: rgba(255,255,255,0.05);
        padding: 4px 8px;
        border-radius: 4px;
        margin-left: 10px;
        display: inline-block;
    }
</style>

<div class="container">

        <div id="adminContent" style="display:none;">

            </div>
            
            <div class="match-card">
                <h3><span style="color:var(--info)">01.</span> Ростер команд и игроков</h3>
                <div style="display:grid; grid-template-columns: 1.5fr 1fr auto; gap: 10px; align-items: center;">
                    <input type="text" id="tName" placeholder="Имя команды">
                    <input type="number" id="tPower" placeholder="Сила команды (1-100)" value="50" min="1" max="100">
                    <button onclick="addTeam()" style="height: 50px;">Добавить команду</button>
                </div>
                <div id="teamsDisplay" style="margin-top:20px;"></div>
                
                <div id="playerEditor" class="player-editor-box" style="display:none;">
                    <h4 id="editingTeamName" style="color:var(--accent); margin-top:0;">Редактирование состава</h4>
                    <div id="playerList"></div>
                    <div class="player-row">
                        <input type="text" id="pNick" placeholder="Ник игрока">
                        <select id="pRole">
                            <option value="Captain">Капитан</option>
                            <option value="Sniper">Снайпер</option>
                            <option value="Rifler">Рифлер</option>
                            <option value="Support">Саппорт</option>
                            <option value="Lurker">Люркер</option>
                        </select>
                        <button onclick="savePlayer()" style="padding: 10px;">+</button>
                    </div>
                    <button onclick="closePlayerEditor()" style="background:#444; color:white; width:100%; margin-top:10px;">Закрыть</button>
                </div>
            </div>
            
            <div class="match-card">
                <h3><span style="color:var(--info)">02.</span> Планировщик матчей</h3>
                <input type="text" id="matchStageName" placeholder="Этап (Группы / Плей-офф / Финал)" style="width: 95%;">

                <div style="display: flex; align-items: center; justify-content: center; margin: 15px 0;">
                    <select id="sel1"></select> 
                    <span style="margin: 0 15px; font-weight: 900; color: var(--accent);">VS</span> 
                    <select id="sel2"></select>
                </div>
                <div style="text-align: center;">
                    <select id="bo" style="width: 200px;">
                        <option value="1">Best of 1</option>
                        <option value="3">Best of 3</option>
                        <option value="5">Best of 5</option>
                    </select>
                    <button onclick="startVeto()" style="background:var(--info); color:white; margin-left:10px;">Запустить Veto</button>
                </div>
            </div>
            
            <div id="currentSeriesDisplay" style="display:none;" class="match-card">
                <div class="match-stage" style="background: var(--info);">Live Simulation</div>
                <h2 id="seriesTitle" style="text-align:center; margin: 10px 0 25px 0; font-size: 1.8em;"></h2>
                <div id="vetoLogLive" class="veto-box"></div>
                <div id="mapControls" style="text-align:center; margin-top:25px;"></div>
                <div id="liveRoundFeed" class="round-history" style="display:none; margin-top:25px;"></div>
            </div>
        </div>
        
        <div id="matchHistory"></div>
    </div>
</div>

function auth(isAdmin) {
    const _access_vault = "UEFSQUxMQVgzOTUwUA==";
    if (isAdmin === true) {
        let inputPass = document.getElementById("pass").value;
        if (btoa(inputPass) === _access_vault) {

    }

function logout() { 
    sessionStorage.clear(); 
    localStorage.clear(); 
    location.reload(); 
}

function exitTourney() { 
    localStorage.removeItem("es_tourney_id"); 
    currentTourneyId = null; 
    checkState(); 
}

function checkState() {
    const authUI = document.getElementById("authSection");
    const tourneyUI = document.getElementById("tourneySection");
    const mainUI = document.getElementById("mainPanel");
    const adminUI = document.getElementById("adminContent");
    
    authUI.style.display = !currentRole ? "block" : "none";
    
    if(currentRole) {
        if(!currentTourneyId) {
            tourneyUI.style.display = "block";
            mainUI.style.display = "none";
            document.getElementById("adminTourneyCreate").style.display = currentRole === "admin" ? "block" : "none";
            loadTournaments();
        } else {
            tourneyUI.style.display = "none";
            mainUI.style.display = "block";
            adminUI.style.display = currentRole === "admin" ? "block" : "none";
            loadTourneyData();
        }
    }
}

function loadTournaments() {
    db.ref("tournaments").on("value", s => {
        const val = s.val() || {};
        tournaments = Object.keys(val).map(k => ({...val[k], realId: k})).sort((a,b) => {
            if(a.status === 'active' && b.status !== 'active') return -1;
            if(a.status !== 'active' && b.status === 'active') return 1;
            if(a.status === 'finished' && b.status === 'finished') {
                return (b.finishedAt || b.id) - (a.finishedAt || a.id);
            }
            return b.id - a.id;
        });
        
        document.getElementById("tourneyList").innerHTML = tournaments.map(t => `
            <div class="tourney-card ${t.status === 'finished' ? 'finished' : ''}">
                <div onclick="selectTourney('${t.realId}')" style="height:100%; width:100%;">
                    <span class="status-badge ${t.status === 'active' ? 'status-active' : 'status-finished'}">
                        ${t.status === 'active' ? '• Активен' : '✓ В архиве'}
                    </span>
                    <br><b>${t.name}</b>
                </div>
                ${currentRole === 'admin' ? `<button class="btn-delete-tourney" onclick="event.stopPropagation(); deleteTourney('${t.realId}')">×</button>` : ''}
            </div>`).join("");
    });
}

function createTourney() { 
    const n = document.getElementById("newTourneyName").value.trim(); 
    if(n) {
        let newRef = db.ref("tournaments").push({ name: n, status: "active", id: Date.now() }); 
        let newTourneyId = newRef.key;
        
        db.ref("teams").once("value", s => {
            let allTeams = s.val() || {};
            let bestTeams = [];
            for(let k in allTeams) {
                if(allTeams[k] && allTeams[k].length > bestTeams.length) {
                    bestTeams = allTeams[k];
                }
            }
            if(bestTeams.length > 0) {
                db.ref("teams/" + newTourneyId).set(bestTeams);
            }
        });
    }
    document.getElementById("newTourneyName").value = "";
}

function selectTourney(id) { 
    currentTourneyId = id; 
    localStorage.setItem("es_tourney_id", id); 
    checkState(); 
}

function finishTourney() { 
    if(confirm("Перенести турнир в архив?")) {
        db.ref("tournaments/" + currentTourneyId).update({ status: "finished", finishedAt: Date.now() }); 
    }
}

function deleteTourney(id) { 
    if(confirm("ВНИМАНИЕ: Безвозвратно удалить турнир и всю его историю матчей?")) {
        db.ref("tournaments/" + id).remove(); 
    }
}

function loadTourneyData() {
    db.ref("tournaments/" + currentTourneyId).on("value", s => {
        const t = s.val(); 
        if(!t) return exitTourney();
        document.getElementById("activeTourneyName").innerText = t.name;
    });
    
    db.ref("teams/" + currentTourneyId).on("value", s => { 
        let rawTeams = s.val() || [];
        teams = (Array.isArray(rawTeams) ? rawTeams : Object.values(rawTeams)).map(t => {
            if (t) {
                t.players = Array.isArray(t.players) ? t.players : Object.values(t.players || {});
            }
            return t;
        }).filter(t => t);
        updateSelectors(); 
    });
    
    db.ref("matches/" + currentTourneyId).on("value", s => { 
        matches = Object.values(s.val() || {}).reverse(); 
        renderHistory(); 
    });
}

function updateSelectors() {
    const d = document.getElementById("teamsDisplay");
    if(d) {
        d.innerHTML = teams.map((t,i) => `
            <div class="team-item" onclick="openPlayerEditor(${i})">
                <span>
                    <b>${t.name}</b> 
                    <small style="color:var(--info)">[Players: ${(Array.isArray(t.players) ? t.players : Object.values(t.players || {})).length}/5 | Power: ${calculateTeamPower(t)}]</small>
                </span>
                <b onclick="event.stopPropagation(); deleteTeam(${i})" style="color:var(--danger); font-size:18px;">×</b>
            </div>`).join("");
    }
    
    const s1 = document.getElementById("sel1");
    const s2 = document.getElementById("sel2");
    
    if(s1 && s2) { 
        s1.innerHTML = ""; 
        s2.innerHTML = ""; 
        teams.forEach((t,i) => { 
            s1.add(new Option(t.name,i)); 
            s2.add(new Option(t.name,i)); 
        }); 
    }
}

function addTeam() { 
    let n = document.getElementById("tName"); 
    let p = document.getElementById("tPower");
    
    if(n.value && p.value) { 
        let teamPower = parseInt(p.value) || 50;
        teams.push({ name: n.value, power: teamPower, players: [] }); 
        db.ref("teams/" + currentTourneyId).set(teams); 
        n.value = ""; 
        p.value = "50";
    } else {
        alert("Заполните имя и силу команды");
    }
}

function deleteTeam(i) { 
    if(confirm("Удалить команду?")) { 
        teams.splice(i,1); 
        db.ref("teams/" + currentTourneyId).set(teams); 
    } 
}

function openPlayerEditor(idx) {
    editingTeamIdx = idx;
    const t = teams[idx];
    document.getElementById("playerEditor").style.display = "block";
    document.getElementById("editingTeamName").innerText = "Состав: " + t.name + " (Сила: " + calculateTeamPower(t) + ")";
    renderPlayers();
}

function closePlayerEditor() { 
    document.getElementById("playerEditor").style.display = "none"; 
    editingTeamIdx = null; 
}

function renderPlayers() {
    const t = teams[editingTeamIdx];
    const list = document.getElementById("playerList");
    let pArr = Array.isArray(t.players) ? t.players : Object.values(t.players || {});
    
    list.innerHTML = pArr.map((p, i) => `
        <div class="player-row" style="background:rgba(255,255,255,0.05); padding:5px 15px; border-radius:8px;">
            <div style="font-weight:bold; font-size: 14px;">${p.nick}</div>
            <div style="color:var(--info); font-size:12px;">${p.role}</div>
            <button onclick="removePlayer(${i})" style="padding:4px 12px; background:var(--danger); border-radius: 6px;">Удалить</button>
        </div>
    `).join("");
}

function savePlayer() {
    const t = teams[editingTeamIdx];
    t.players = Array.isArray(t.players) ? t.players : Object.values(t.players || {});
    if(t.players.length >= 5) return alert("В команде может быть только 5 игроков.");
    
    const nick = cleanName(document.getElementById("pNick").value);
    const role = document.getElementById("pRole").value;
    
    if(nick) {
        t.players.push({ nick, role });
        db.ref("teams/" + currentTourneyId).set(teams);
        document.getElementById("pNick").value = "";
        renderPlayers();
    } else {
        alert("Введите корректный ник игрока (без спецсимволов #, [, ], ., $, /)");
    }
}

function removePlayer(idx) {
    teams[editingTeamIdx].players = Array.isArray(teams[editingTeamIdx].players) ? teams[editingTeamIdx].players : Object.values(teams[editingTeamIdx].players || {});
    teams[editingTeamIdx].players.splice(idx, 1);
    db.ref("teams/" + currentTourneyId).set(teams);
    renderPlayers();
}

function calculateTeamPower(team) {
    if (team.power !== undefined && team.power > 0) return team.power;
    let pArr = Array.isArray(team.players) ? team.players : Object.values(team.players || {});
    if (pArr.length === 0) return 0;
    return pArr.reduce((sum, p) => sum + (p.power || 0), 0);
}

            let p = pool.splice(Math.floor(Math.random()*pool.length), 1)[0];
            let chooser = (k==1||k==3)?t1:t2; 
            let other = (k==1||k==3)?t2:t1;
            let s = getS(p, other, chooser); 
            maps.push({name:p, t_start: s.t, ct_start: s.ct});
            log.push(`[Pick ${k}] ${chooser.name} выбрал ${p}. ${other.name} за ${s.ct===other.name?'CT':'T'}`);
        }
        let dec = pool[0]; 
        let kw = Math.random()>0.5?t1.name:t2.name; 
        let strongSide = MAP_DATA[dec].side;
        let side = (strongSide === "CT") ? (kw === t2.name) : (kw === t1.name);
        maps.push({name:dec, t_start: side?t1.name:t2.name, ct_start: side?t2.name:t1.name});
        log.push(`[Decider] ${dec}. Ножи: ${kw}. Победитель забрал ${strongSide} сторону.`);
    }

    activeMatch = { t1, t2, maps, bo, results: [], currentMapIdx: 0, wins1: 0, wins2: 0, veto: log, id: Date.now(), stage };
    
    db.ref(`matches/${currentTourneyId}/${activeMatch.id}`).set({ 
        id: activeMatch.id, t1: t1.name, p1: calculateTeamPower(t1), t2: t2.name, p2: calculateTeamPower(t2), 
        total: "0:0", bo, details: [], veto: log, stage 
    });
    
    document.getElementById("currentSeriesDisplay").style.display = "block";
    renderActiveMatch();
}

// 5.7.0 V2: FIREPOWER & INVENTORY ENGINE
function getWeaponForRole(role, ecoType, isT) {
    if (ecoType === "PISTOL") return isT ? "Glock-18" : "USP-S";
    if (ecoType === "ECO") return isT ? "P250" : "P250";
    if (ecoType === "FORCE") {
        if (role === "Sniper") return "SSG 08";
        return isT ? "MAC-10" : "MP9";
    }
    if (role === "Sniper") return "AWP";
    if (role === "Support") return isT ? "Galil AR" : "FAMAS";
    return isT ? "AK-47" : "M4A4";
}

function getPlayerKillWeight(role) {
    if (role === 'Sniper') return 30;
    if (role === 'Lurker') return 25;
    if (role === 'Rifler') return 20;
    if (role === 'Support') return 15;
    if (role === 'Captain') return 10;
    return 20; 
}

function selectPlayerWeighted(playersArr) {
    if (playersArr.length === 0) return null;
    let totalWeight = playersArr.reduce((sum, p) => sum + getPlayerKillWeight(p.role), 0);
    let r = Math.random() * totalWeight;
    let acc = 0;
    for (let p of playersArr) {
        acc += getPlayerKillWeight(p.role);
        if (r <= acc) return p;
    }
    return playersArr[playersArr.length - 1];
}

const evaluateSavedGear = (teamPlayers, invState) => {
    let fullCount = 0;
    let gearValue = 0;
    teamPlayers.forEach(p => {
        let inv = invState[p.nick];
        if (["AWP", "AK-47", "M4A4", "Galil AR", "FAMAS"].includes(inv.w)) {
            fullCount++;
            gearValue += 3000;
        } else if (["MAC-10", "MP9", "SSG 08"].includes(inv.w)) {
            gearValue += 1500;
        }
        if (inv.a) gearValue += 1000;
    });
    return { fullCount, gearValue };
};

function conductUltraRound(t1, t2, mObj, state) {
    t1.players = Array.isArray(t1.players) ? t1.players : Object.values(t1.players || {});
    t2.players = Array.isArray(t2.players) ? t2.players : Object.values(t2.players || {});

    // 1. Инициализация статистики и инвентарей
    if (!state.pStats) {
        state.pStats = { t1: {}, t2: {} };
        state.inventories = { t1: {}, t2: {} };
        t1.players.forEach(p => {
            state.pStats.t1[p.nick] = { role: p.role, k: 0, a: 0, d: 0, dmg: 0, hs: 0, plants: 0, defuses: 0 };
            state.inventories.t1[p.nick] = { w: null, a: false, g: [] };
        });
        t2.players.forEach(p => {
            state.pStats.t2[p.nick] = { role: p.role, k: 0, a: 0, d: 0, dmg: 0, hs: 0, plants: 0, defuses: 0 };
            state.inventories.t2[p.nick] = { w: null, a: false, g: [] };
        });
    }

    let t1IsT = (state.r < 12) ? state.t1T : !state.t1T; 
    let t2IsT = !t1IsT;
    let isOT = false;
    let otResetMsg = false;
    
    if(state.r >= 24) {
        t1IsT = (Math.floor((state.r-24)/3) % 2 === 0) ? state.t1T : !state.t1T;
        t2IsT = !t1IsT;
        isOT = true;
    }

    let isPistol = (state.r === 0 || state.r === 12);
    
    if(isOT && ((state.r - 24) % 3 === 0)) {
        state.m1 = 50000;
        state.m2 = 50000;
        otResetMsg = true;
    }

    let gear1 = evaluateSavedGear(t1.players, state.inventories.t1);
    let gear2 = evaluateSavedGear(t2.players, state.inventories.t2);

    // 2. УМНЫЙ ЗАКУП (С учетом инвентарей)
    const calculateTeamBuy = (money, isPistol, isOT, lossStreak, currentRound, savedGear) => {
        if(isOT) {
            let cost = Math.min(money, 23500);
            return { type: cost >= 20000 ? "FULL" : "FORCE", cost: cost };
        }
        if(isPistol) return { type: "PISTOL", cost: Math.min(money, 1500) };
        
        let neededFulls = 5 - savedGear.fullCount;
        let expectedCostForFull = neededFulls * 4500; 

        if (currentRound === 11 || currentRound === 23) {
            if (money >= expectedCostForFull) return { type: "FULL", cost: expectedCostForFull };
            return { type: "FORCE", cost: money };
        }

        if (money >= expectedCostForFull) return { type: "FULL", cost: expectedCostForFull };
        
        // 5.7.0 Fix: Никогда не ECO, если сохранили много ганов
        if (savedGear.fullCount >= 3) return { type: "FORCE", cost: money };

        let expectedLossIncome = (1400 + (Math.min(lossStreak || 0, 4) * 500)) * 5;
        let maxSpendToKeepFull = (money + expectedLossIncome) - (5 * 4500);

        if (maxSpendToKeepFull <= 2000) return { type: "ECO", cost: Math.min(money, 1500) };
        if (maxSpendToKeepFull > 7000) return { type: "FORCE", cost: Math.min(money, maxSpendToKeepFull) };
        if (money >= 14000 && Math.random() > 0.8) return { type: "FORCE", cost: money };

        return { type: "ECO", cost: Math.min(money, Math.max(1500, maxSpendToKeepFull)) };
    };

    let m1_start = state.m1;
    let m2_start = state.m2;

    let buy1 = calculateTeamBuy(state.m1, isPistol, isOT, state.l1, state.r, gear1);
    let buy2 = calculateTeamBuy(state.m2, isPistol, isOT, state.l2, state.r, gear2);

    state.m1 -= buy1.cost;
    state.m2 -= buy2.cost;
    
    let m1_after = state.m1;
    let m2_after = state.m2;

    // Раздача экипировки на текущий раунд
    let currentEquip1 = {}, currentEquip2 = {};
    
    t1.players.forEach(p => {
        let inv = state.inventories.t1[p.nick];
        if (!inv.w || (buy1.type === "FULL" && !["AWP", "AK-47", "M4A4", "Galil AR", "FAMAS"].includes(inv.w))) {
            inv.w = getWeaponForRole(p.role, buy1.type, t1IsT);
            inv.a = (buy1.type !== "ECO");
            if (buy1.type === "FULL") inv.g = ["Smoke", "Flash", "HE"];
            else if (buy1.type === "FORCE") inv.g = ["Flash"];
            else inv.g = [];
        }
        currentEquip1[p.nick] = inv;
    });

    t2.players.forEach(p => {
        let inv = state.inventories.t2[p.nick];
        if (!inv.w || (buy2.type === "FULL" && !["AWP", "AK-47", "M4A4", "Galil AR", "FAMAS"].includes(inv.w))) {
            inv.w = getWeaponForRole(p.role, buy2.type, t2IsT);
            inv.a = (buy2.type !== "ECO");
            if (buy2.type === "FULL") inv.g = ["Smoke", "Flash", "HE"];
            else if (buy2.type === "FORCE") inv.g = ["Flash"];
            else inv.g = [];
        }
        currentEquip2[p.nick] = inv;
    });

    // 3. РАСЧЕТ ШАНСОВ (Математика по Firepower 5.7.0)
    let p1 = calculateTeamPower(t1);
    let p2 = calculateTeamPower(t2);
    let baseChance = (p1 / (p1 + p2)) * 100;
    
    let sideChanceMod = 0;
    let sideStrong = MAP_DATA[mObj.name].side;
    let b = MAP_DATA[mObj.name].bonus;
    if (sideStrong === "CT") { sideChanceMod += (!t1IsT ? b : -b); } 
    else { sideChanceMod += (t1IsT ? b : -b); }
    
    let fp1 = buy1.cost + gear1.gearValue;
    let fp2 = buy2.cost + gear2.gearValue;
    let diff = fp1 - fp2;
    let econChanceMod = (diff / 1000) * 1.8;
    econChanceMod = Math.max(-35, Math.min(35, econChanceMod));
    
    let finalChance = baseChance + sideChanceMod + econChanceMod;
    finalChance = Math.max(5, Math.min(95, finalChance));
    let win1 = (Math.random() * 100) < finalChance;

    // 4. СИМУЛЯЦИЯ СОБЫТИЙ
    let roundEvents = [];
    let alive1 = [...t1.players];
    let alive2 = [...t2.players];
    
    let winnerDeaths = Math.floor(Math.random() * 5);
    let loserDeaths = 5; 
    let isBombPlant = false, isDefuse = false;

    if (win1) { 
        if (t1IsT) { if (Math.random() > 0.4) { isBombPlant = true; loserDeaths = Math.floor(Math.random() * 3) + 3; } } 
        else { if (Math.random() > 0.6) { isBombPlant = true; isDefuse = true; loserDeaths = Math.floor(Math.random() * 3) + 3; } }
    } else { 
        if (!t1IsT) { if (Math.random() > 0.4) { isBombPlant = true; loserDeaths = Math.floor(Math.random() * 3) + 3; } } 
        else { if (Math.random() > 0.6) { isBombPlant = true; isDefuse = true; loserDeaths = Math.floor(Math.random() * 3) + 3; } }
    }

    let deaths1 = win1 ? winnerDeaths : loserDeaths;
    let deaths2 = win1 ? loserDeaths : winnerDeaths;

    let roundEarnedM1 = 0;
    let roundEarnedM2 = 0;

    const tColor = "var(--t-color)";
    const ctColor = "var(--ct-color)";
    
    let totalKills = deaths1 + deaths2;
    for(let i=0; i<totalKills; i++) {
        let team1Kills = deaths2 > 0;
        let team2Kills = deaths1 > 0;
        let t1GetsKill = (team1Kills && team2Kills) ? (Math.random() > 0.5) : team1Kills;

        if (t1GetsKill) {
            deaths2--;
            let killer = selectPlayerWeighted(t1.players);
            let victimIdx = Math.floor(Math.random() * alive2.length);
            let victim = alive2[victimIdx] || t2.players[0];
            if(alive2.length > 0) alive2.splice(victimIdx, 1);
            
            let weapon = currentEquip1[killer.nick].w;
            let hsEvent = Math.random() > 0.5 ? " 🎯" : ""; 
            
            let nadeEvent = "";
            let killerG = currentEquip1[killer.nick].g;
            if (killerG.length > 0 && Math.random() > 0.7) {
                let nade = killerG.shift();
                if (nade === "Flash") nadeEvent = " (под флешку 💥)";
                if (nade === "Smoke") nadeEvent = " (в дыму 🌫️)";
                if (nade === "HE") nadeEvent = " (осколками HE 💣)";
            }

            roundEvents.push(`<div class="event-line"><span class="event-kill" style="color:${t1IsT ? tColor : ctColor}">${killer.nick}</span> <span class="weapon-icon">${weapon}</span> убил <span style="color:${t2IsT ? tColor : ctColor}">${victim.nick}</span><span style="opacity:0.7; font-size:10px;">${nadeEvent}</span>${hsEvent}</div>`);
            
            if(killer) {
                state.pStats.t1[killer.nick].k++;
                if(hsEvent !== "") state.pStats.t1[killer.nick].hs++;
                state.pStats.t1[killer.nick].dmg += Math.floor(Math.random() * 50 + 80);
                if(alive1.length > 1 && Math.random() > 0.6) {
                    let ast = alive1[Math.floor(Math.random() * alive1.length)];
                    if(ast.nick !== killer.nick) { state.pStats.t1[ast.nick].a++; state.pStats.t1[ast.nick].dmg += Math.floor(Math.random() * 40 + 20); }
                }
            }
            if(victim) {
                state.pStats.t2[victim.nick].d++;
                state.inventories.t2[victim.nick] = { w: null, a: false, g: [] }; // Сброс инвентаря при смерти
            }
            roundEarnedM1 += (weapon === "AWP" ? 100 : 300);
        } else {
            deaths1--;
            let killer = selectPlayerWeighted(t2.players);
            let victimIdx = Math.floor(Math.random() * alive1.length);
            let victim = alive1[victimIdx] || t1.players[0];
            if(alive1.length > 0) alive1.splice(victimIdx, 1);
            
            let weapon = currentEquip2[killer.nick].w;
            let hsEvent = Math.random() > 0.5 ? " 🎯" : "";
            
            let nadeEvent = "";
            let killerG = currentEquip2[killer.nick].g;
            if (killerG.length > 0 && Math.random() > 0.7) {
                let nade = killerG.shift();
                if (nade === "Flash") nadeEvent = " (под флешку 💥)";
                if (nade === "Smoke") nadeEvent = " (в дыму 🌫️)";
                if (nade === "HE") nadeEvent = " (осколками HE 💣)";
            }

            roundEvents.push(`<div class="event-line"><span class="event-kill" style="color:${t2IsT ? tColor : ctColor}">${killer.nick}</span> <span class="weapon-icon">${weapon}</span> убил <span style="color:${t1IsT ? tColor : ctColor}">${victim.nick}</span><span style="opacity:0.7; font-size:10px;">${nadeEvent}</span>${hsEvent}</div>`);
            
            if(killer) {
                state.pStats.t2[killer.nick].k++;
                if(hsEvent !== "") state.pStats.t2[killer.nick].hs++;
                state.pStats.t2[killer.nick].dmg += Math.floor(Math.random() * 50 + 80);
                if(alive2.length > 1 && Math.random() > 0.6) {
                    let ast = alive2[Math.floor(Math.random() * alive2.length)];
                    if(ast.nick !== killer.nick) { state.pStats.t2[ast.nick].a++; state.pStats.t2[ast.nick].dmg += Math.floor(Math.random() * 40 + 20); }
                }
            }
            if(victim) {
                state.pStats.t1[victim.nick].d++;
                state.inventories.t1[victim.nick] = { w: null, a: false, g: [] }; // Сброс инвентаря
            }
            roundEarnedM2 += (weapon === "AWP" ? 100 : 300);
        }
    }

    if (isBombPlant) {
        let planterTeam = t1IsT ? t1 : t2;
        let planterTeamObj = t1IsT ? state.pStats.t1 : state.pStats.t2;
        let planterColor = t1IsT ? (t1IsT ? tColor : ctColor) : (t2IsT ? tColor : ctColor); 
        let planter = selectPlayerWeighted(planterTeam.players);
        
        roundEvents.splice(Math.floor(roundEvents.length/2), 0, `<div class="event-line event-bomb">🧨 <span style="color:${planterColor}">${planter.nick}</span> установил бомбу</div>`);
        
        if (planter) planterTeamObj[planter.nick].plants++;
        if(t1IsT) roundEarnedM1 += 1500; else roundEarnedM2 += 1500;
        
        if (isDefuse) {
            let defuserTeam = t1IsT ? t2 : t1;
            let defuserTeamObj = t1IsT ? state.pStats.t2 : state.pStats.t1;
            let defuserColor = t1IsT ? (t2IsT ? tColor : ctColor) : (t1IsT ? tColor : ctColor); 
            let defuserAlive = t1IsT ? alive2 : alive1;
            let defuser = defuserAlive.length > 0 ? defuserAlive[0] : defuserTeam.players[0];
            
            roundEvents.push(`<div class="event-line event-defuse">✂️ <span style="color:${defuserColor}">${defuser.nick}</span> обезвредил бомбу</div>`);
            
            if (defuser) defuserTeamObj[defuser.nick].defuses++;
            if(t1IsT) roundEarnedM2 += 1500; else roundEarnedM1 += 1500; 
        }
    }

    const winMoney = 16250; 
    const getLossMoney = (streak) => (1400 + (Math.min(streak, 4) * 500)) * 5;
    
    let totalEarned1 = roundEarnedM1;
    let totalEarned2 = roundEarnedM2;

    if(win1) {
        state.r1++; state.l1 = 0; state.l2++;
        totalEarned1 += winMoney; totalEarned2 += getLossMoney(state.l2 - 1);
        state.m1 += totalEarned1; state.m2 += totalEarned2;
    } else {
        state.r2++; state.l2 = 0; state.l1++;
        totalEarned2 += winMoney; totalEarned1 += getLossMoney(state.l1 - 1);
        state.m2 += totalEarned2; state.m1 += totalEarned1;
    }

    state.m1 = Math.min(state.m1, 80000); 
    state.m2 = Math.min(state.m2, 80000);

    let chanceLogHtml = `
    <div style="background: rgba(255,255,255,0.03); padding: 10px 15px; border-radius: 8px; margin-bottom: 12px; font-size: 11px; border-left: 3px solid #4a90e2;">
        <b style="color:var(--info)">РАСЧЕТ ШАНСОВ ПЕРЕД РАУНДОМ:</b><br>
        <span style="opacity:0.8">• База (Сила): ${t1.name} ${baseChance.toFixed(1)}% vs ${t2.name} ${(100-baseChance).toFixed(1)}%</span><br>
        <span style="opacity:0.8">• Бонус стороны (${mObj.name} - ${sideStrong}): ${sideChanceMod > 0 ? '+' : ''}${sideChanceMod.toFixed(1)}% для ${t1.name}</span><br>
        <span style="opacity:0.8">• Экономика (Firepower: $${fp1} vs $${fp2}): ${econChanceMod > 0 ? '+' : ''}${econChanceMod.toFixed(1)}% для ${t1.name}</span><br>
        <b style="color:var(--accent); margin-top:5px; display:inline-block;">ИТОГОВЫЙ ШАНС ПОБЕДЫ: ${t1.name.toUpperCase()} ${finalChance.toFixed(1)}% | ${t2.name.toUpperCase()} ${(100-finalChance).toFixed(1)}%</b>
    </div>`;
    
    roundEvents.unshift(chanceLogHtml);

    let incomeLogHtml = `
    <div style="background: rgba(0,255,65,0.03); padding: 8px 15px; border-radius: 8px; margin-top: 12px; font-size: 11px; border-left: 3px solid #00ff41; color:#a0a0a0;">
        <b>Доход по итогам раунда:</b> ${t1.name} <span style="color:var(--accent)">+$${totalEarned1}</span> | ${t2.name} <span style="color:var(--accent)">+$${totalEarned2}</span>
    </div>`;
    roundEvents.push(incomeLogHtml);

    let ecoLabel1 = `<span class="economy-label ${buy1.type.toLowerCase()}-tag">${buy1.type}</span>`;
    let ecoLabel2 = `<span class="economy-label ${buy2.type.toLowerCase()}-tag">${buy2.type}</span>`;
    
    let moneyInfo1 = `<span class="econ-summary">$${m1_start} ➝ $${m1_after}</span>`;
    let moneyInfo2 = `<span class="econ-summary">$${m2_start} ➝ $${m2_after}</span>`;
    
    if(otResetMsg) roundEvents.unshift(`<div class="event-line" style="color:var(--accent); font-weight:bold; font-size:14px; text-align:center; padding: 10px 0;">[OVERTIME: СБРОС ДЕНЕГ ДО СТАРТОВЫХ ($10,000 НА ИГРОКА)]</div>`);

    let htmlBlock = `
    <details class="round-detail-block">
        <summary>
            <div>
                <span style="opacity:0.5; margin-right:10px;">R${state.r+1}</span>
                <span class="${t1IsT?'r-t':'r-ct'}">${state.r1}</span> : <span class="${t1IsT?'r-ct':'r-t'}">${state.r2}</span>
                <span style="margin-left: 15px; font-size:11px; opacity:0.8;">Win Chance: ${finalChance.toFixed(1)}% vs ${(100-finalChance).toFixed(1)}%</span>
            </div>
            <div>
                ${ecoLabel1} ${moneyInfo1} <span style="margin: 0 10px; opacity: 0.5;">VS</span> ${moneyInfo2} ${ecoLabel2}
            </div>
        </summary>
        <div class="round-events">${roundEvents.join("")}</div>
    </details>`;
    
    state.h.push(htmlBlock);
    
    // Смена сторон (Сброс инвентаря)
    if (state.r === 11 || (state.r >= 23 && (state.r - 23) % 3 === 0)) {
        state.h.push(`<div style="text-align:center; padding: 15px; color:var(--accent); font-weight:bold; font-size:13px; letter-spacing:3px; background:rgba(0,255,65,0.05); border-radius:8px; margin: 15px 0; border: 1px dashed var(--accent);">--- СМЕНА СТОРОН (СБРОС ИНВЕНТАРЯ) ---</div>`);
        if(state.r === 11) { state.m1 = 4000; state.m2 = 4000; state.l1 = 0; state.l2 = 0; }
        
        t1.players.forEach(p => state.inventories.t1[p.nick] = { w: null, a: false, g: [] });
        t2.players.forEach(p => state.inventories.t2[p.nick] = { w: null, a: false, g: [] });
    }
    
    state.r++;
    return state;
}

function renderActiveMatch() {
    const am = activeMatch; 
    if(!am) return;
    
    document.getElementById("seriesTitle").innerText = `${am.t1.name} [${am.wins1}:${am.wins2}] ${am.t2.name}`;
    document.getElementById("vetoLogLive").innerHTML = "<b>Лог предматчевой подготовки:</b><br>" + am.veto.join("<br>");
    
    let cur = am.maps[am.currentMapIdx];
    document.getElementById("mapControls").innerHTML = `
        <p>Текущая карта: <b style="color:var(--accent); font-size:1.2em;">${cur.name}</b></p>
        <button onclick="playNextMapFull()" style="margin-right:15px; padding: 12px 25px;">Вся карта сразу</button>
        <button onclick="playOneRoundStep()" style="background:var(--info); color:white; padding: 12px 25px; box-shadow: 0 4px 15px rgba(0, 180, 255, 0.3);">+1 Раунд (Live Симуляция)</button>
    `;
    
    let liveFeed = document.getElementById("liveRoundFeed");
    if(currentLiveMapState && currentLiveMapState.h.length > 0) {
        liveFeed.style.display = "flex";
        liveFeed.innerHTML = currentLiveMapState.h.join("");
        liveFeed.scrollTop = liveFeed.scrollHeight;
    } else {
        liveFeed.style.display = "none";
    }
}

function playOneRoundStep() {
    let am = activeMatch, mObj = am.maps[am.currentMapIdx];
    if(!currentLiveMapState) {
        currentLiveMapState = { r1:0, r2:0, l1:0, l2:0, r:0, h:[], m1: 4000, m2: 4000, t1T: (mObj.t_start === am.t1.name), pStats: null };
    }

    currentLiveMapState = conductUltraRound(am.t1, am.t2, mObj, currentLiveMapState);
    renderActiveMatch();

    let s = currentLiveMapState;
    let isEnd = false;
    
    if((s.r1===13 && s.r2<12) || (s.r2===13 && s.r1<12)) isEnd = true;
    
    if(s.r1>=12 && s.r2>=12){ 
        let lim = 16; 
        while(s.r1 > lim-1 && s.r2 > lim-1) { lim += 3; }
        if((s.r1 === lim && Math.abs(s.r1-s.r2)>=2) || (s.r2 === lim && Math.abs(s.r2-s.r1)>=2)) isEnd = true; 
    }

    if(isEnd) { saveMapResult(s); currentLiveMapState = null; }
}

function playNextMapFull() {
    let am = activeMatch, mObj = am.maps[am.currentMapIdx];
    let s = { r1:0, r2:0, l1:0, l2:0, r:0, h:[], m1: 4000, m2: 4000, t1T: (mObj.t_start === am.t1.name), pStats: null };
    
    for(let i=0; i<80; i++){
        s = conductUltraRound(am.t1, am.t2, mObj, s);
        if((s.r1===13 && s.r2<12) || (s.r2===13 && s.r1<12)) break;
        if(s.r1>=12 && s.r2>=12){ 
            let lim = 16; 
            while(s.r1 > lim-1 && s.r2 > lim-1) { lim += 3; }
            if((s.r1 === lim && Math.abs(s.r1-s.r2)>=2) || (s.r2 === lim && Math.abs(s.r2-s.r1)>=2)) break; 
        }
    }
    saveMapResult(s);
}

function saveMapResult(s) {
    let am = activeMatch, mObj = am.maps[am.currentMapIdx];
    
    am.results.push({ 
        name: mObj.name, score: `${s.r1}:${s.r2}`, rounds: s.h, t_start: mObj.t_start, 
        ct_start: mObj.ct_start, sideBonus: MAP_DATA[mObj.name].side, bonus: MAP_DATA[mObj.name].bonus, pStats: s.pStats 
    });
    
    if(s.r1 > s.r2) am.wins1++; else am.wins2++;
    am.currentMapIdx++;
    
    db.ref(`matches/${currentTourneyId}/${am.id}`).update({ total: `${am.wins1}:${am.wins2}`, details: am.results });
    
    if(am.wins1 >= Math.ceil(am.bo/2) || am.wins2 >= Math.ceil(am.bo/2)) { 
        activeMatch = null; 
        document.getElementById("currentSeriesDisplay").style.display="none"; 
        document.getElementById("liveRoundFeed").style.display="none";
    } else {
        renderActiveMatch();
    }
}

function generateStatsTable(tName, statsObj) {
    if (!statsObj) return "";
    let sortedNicks = Object.keys(statsObj).sort((a, b) => statsObj[b].k - statsObj[a].k);
    
    let rows = sortedNicks.map(nick => {
        let st = statsObj[nick];
        let hsPercent = st.k > 0 ? Math.round((st.hs / st.k) * 100) : 0;
        let kd = st.d > 0 ? (st.k / st.d).toFixed(2) : st.k.toFixed(2);
        let adr = Math.round(st.dmg / 24); 
        
        return `<tr>
            <td><b>${nick}</b></td><td style="color:var(--info)">${st.role}</td><td style="font-weight:bold; font-size:14px;">${st.k}</td>
            <td>${st.a}</td><td style="color:#ff5252">${st.d}</td><td style="color:${kd>=1?'var(--accent)':'var(--danger)'}; font-weight:bold;">${kd}</td>
            <td>${adr}</td><td style="color:#aaa">${hsPercent}%</td><td>${st.plants}</td><td>${st.defuses}</td>
        </tr>`;
    }).join("");
    
    return `
        <div class="stats-table-wrapper" style="margin-bottom: 15px;">
            <table class="stats-table">
                <tr class="team-header-row"><td colspan="10" style="font-size:14px; letter-spacing:1px;">${tName}</td></tr>
                <tr><th>Player</th><th>Role</th><th>K</th><th>A</th><th>D</th><th>K/D</th><th>ADR</th><th>HS%</th><th>Pl</th><th>Df</th></tr>
                ${rows}
            </table>
        </div>`;
}

function renderHistory() {
    document.getElementById("matchHistory").innerHTML = matches.map(m => {
        let matchMvp = null, maxMvpScore = -1, maxKillsForMvp = 0, ovr = {};
        
        (m.details || []).forEach(d => {
            if(d.pStats) {
                Object.keys(d.pStats.t1 || {}).forEach(nick => {
                    if(!ovr[nick]) ovr[nick] = { k:0, a:0, d:0, dmg:0, plants:0, defuses:0, t:m.t1 };
                    let st = d.pStats.t1[nick];
                    ovr[nick].k += st.k; ovr[nick].a += st.a; ovr[nick].d += st.d; ovr[nick].dmg += st.dmg; ovr[nick].plants += st.plants; ovr[nick].defuses += st.defuses;
                });
                Object.keys(d.pStats.t2 || {}).forEach(nick => {
                    if(!ovr[nick]) ovr[nick] = { k:0, a:0, d:0, dmg:0, plants:0, defuses:0, t:m.t2 };
                    let st = d.pStats.t2[nick];
                    ovr[nick].k += st.k; ovr[nick].a += st.a; ovr[nick].d += st.d; ovr[nick].dmg += st.dmg; ovr[nick].plants += st.plants; ovr[nick].defuses += st.defuses;
                });
            }
        });
        
        Object.keys(ovr).forEach(nick => {
            let st = ovr[nick];
            let kd = st.d > 0 ? (st.k / st.d) : st.k;
            let score = (st.k * 2) + (st.a * 1.5) + (st.plants * 2.5) + (st.defuses * 2.5) + (st.dmg / 20) + (kd * 2);
            if(score > maxMvpScore) { maxMvpScore = score; matchMvp = nick; maxKillsForMvp = st.k; }
        });
        
        let mvpHtml = matchMvp ? `
            <div style="text-align:center; padding:18px; background:linear-gradient(90deg, rgba(0,0,0,0), rgba(0, 255, 65, 0.15), rgba(0,0,0,0)); color:var(--accent); font-weight:900; letter-spacing: 3px; border-radius:12px; margin-top:25px; border-top: 1px dashed rgba(0, 255, 65, 0.3); border-bottom: 1px dashed rgba(0, 255, 65, 0.3); font-size:1.2em; text-transform: uppercase;">
                🏆 MATCH MVP: <span style="color:#fff;">${matchMvp}</span> (${maxKillsForMvp} KILLS / SCORE: ${Math.round(maxMvpScore)}) 🏆
            </div>` : '';

        return `
        <div class="match-card">
            ${m.stage ? `<div class="match-stage">${m.stage}</div>` : ''}
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:1.15em;"><b>${m.t1}</b> (${m.p1}) vs <b>${m.t2}</b> (${m.p2}) <small style="opacity:0.5">Bo${m.bo}</small></span>
                <b style="color:var(--accent); font-size:1.8em; font-family: 'JetBrains Mono';">${m.total}</b>
            </div>
            ${(m.details || []).map(d => `
                <div class="map-row">
                    <div style="display:flex; justify-content:space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom:12px; margin-bottom:15px;">
                        <b style="color:var(--info); letter-spacing:1px; font-size:1.2em;">${d.name}</b> 
                        <b style="color:var(--accent); font-size:1.4em;">${d.score}</b>
                    </div>
                    <div style="margin:15px 0; font-size:12px;">
                        <span class="badge badge-t">Attack: ${d.t_start}</span>
                        <span class="badge badge-ct">Defense: ${d.ct_start}</span>
                        <span class="badge" style="background:#222; border: 1px solid #444; color:#fff;">Side: <span style="color:${d.sideBonus==='CT'?'var(--ct-color)':'var(--t-color)'}">${d.sideBonus}</span> (+${d.bonus}%)</span>
                    </div>
                    
                    <span class="toggle-veto" onclick="let b=this.nextElementSibling; b.style.display=b.style.display==='none'?'flex':'none'">[ Детализация раундов (Timeline) ]</span>
                    <div class="round-history" style="display:none; margin-bottom: 25px;">${(d.rounds||[]).join("")}</div>
                    
                    <span class="toggle-veto" onclick="let b=this.nextElementSibling; b.style.display=b.style.display==='none'?'block':'none'">[ Индивидуальная статистика игроков ]</span>
                    <div style="display:none; margin-top: 20px;">
                        ${generateStatsTable(m.t1, d.pStats?.t1)}
                        ${generateStatsTable(m.t2, d.pStats?.t2)}
                    </div>
                </div>
            `).join("")}
            <span class="toggle-veto" onclick="let b=this.nextElementSibling; b.style.display=b.style.display==='none'?'block':'none'">[ Просмотреть детализацию Veto ]</span>
            <div class="veto-box" style="display:none">${(m.veto||[]).join("<br>")}</div>
            ${mvpHtml}
        </div>`
    }).join("");
}

checkState();
</script>
</body>
</html>
