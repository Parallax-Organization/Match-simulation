<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESPORTS MANAGER v4.16 PRO</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
    :root { 
        --bg: #0f111a; 
        --card: #161925; 
        --text: #e0e0e0; 
        --accent: #00ff41; 
        --danger: #ff4b2b; 
        --info: #00b4ff; 
        --t-color: #ff9800; 
        --ct-color: #4a90e2; 
    }
    
    body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        background: var(--bg); 
        color: var(--text); 
        margin: 0; 
        padding: 20px; 
        line-height: 1.5; 
    }

    .container { 
        max-width: 900px; 
        margin: 0 auto; 
        background: var(--card); 
        padding: 35px; 
        border-radius: 20px; 
        border: 1px solid #2d334a; 
        box-shadow: 0 15px 40px rgba(0,0,0,0.6); 
    }
    
    h1 { 
        color: var(--accent); 
        margin: 0; 
        text-align: center; 
        letter-spacing: 3px; 
        text-transform: uppercase; 
        font-size: 2.2em; 
        text-shadow: 0 0 10px rgba(0,255,65,0.3);
    }
    
    .sub-title { 
        color: var(--info); 
        text-align: center; 
        font-weight: bold; 
        letter-spacing: 6px; 
        margin-bottom: 30px; 
        font-size: 0.85em; 
        opacity: 0.8;
    }

    /* CHANGELOG MODULE */
    .changelog-container { 
        background: #0a0c14; 
        border: 1px solid #333; 
        padding: 22px; 
        border-radius: 14px; 
        margin-bottom: 35px; 
        border-left: 5px solid var(--accent); 
    }
    
    .changelog-header { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        margin-bottom: 18px; 
    }
    
    .nav-btns { display: flex; gap: 12px; }
    
    .nav-btn { 
        width: 38px; 
        height: 38px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        background: #1f2335; 
        border: 1px solid #414868; 
        border-radius: 50%; 
        cursor: pointer; 
        color: var(--accent); 
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        font-weight: bold; 
        font-size: 20px; 
    }
    
    .nav-btn:hover { 
        background: var(--accent); 
        color: #000; 
        transform: scale(1.1);
    }
    
    .changelog-content { font-size: 13.5px; color: #b0b0b0; }
    .changelog-content ul { padding-left: 20px; margin: 10px 0; }
    .changelog-content li { margin-bottom: 5px; }
    .ver-title { color: var(--info); font-weight: bold; font-size: 1.2em; }

    /* UI COMPONENTS */
    input, select { 
        background: #1f2335; 
        border: 1px solid #414868; 
        color: white; 
        padding: 13px; 
        border-radius: 9px; 
        margin: 6px; 
        font-size: 14px; 
        outline: none;
    }
    
    input:focus { border-color: var(--info); }
    
    button { 
        background: var(--accent); 
        color: #000; 
        border: none; 
        padding: 13px 28px; 
        border-radius: 9px; 
        cursor: pointer; 
        font-weight: bold; 
        text-transform: uppercase; 
        transition: 0.4s; 
    }
    
    button:hover { 
        filter: brightness(1.2); 
        transform: translateY(-2px); 
        box-shadow: 0 5px 15px rgba(0,255,65,0.2);
    }
    
    /* TOURNAMENT GRID */
    .tourney-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
        gap: 18px; 
        margin-top: 25px; 
    }
    
    .tourney-card { 
        background: #1f2335; 
        padding: 25px; 
        border-radius: 15px; 
        border: 1px solid #333; 
        text-align: center; 
        cursor: pointer; 
        transition: 0.3s ease; 
        position: relative; 
        overflow: hidden;
    }
    
    .tourney-card:hover { 
        border-color: var(--accent); 
        transform: translateY(-5px); 
        background: #252a3f;
    }
    
    .tourney-card.finished { 
        opacity: 0.85; 
        border-color: #444; 
        background: linear-gradient(145deg, #111, #1a1a1a); 
    }
    
    .status-badge { 
        font-size: 10px; 
        text-transform: uppercase; 
        padding: 3px 10px; 
        border-radius: 12px; 
        margin-bottom: 12px; 
        display: inline-block; 
        font-weight: bold;
    }
    
    .status-active { background: rgba(0, 255, 65, 0.15); color: var(--accent); border: 1px solid var(--accent); }
    .status-finished { background: rgba(255, 75, 43, 0.15); color: var(--danger); border: 1px solid var(--danger); }

    /* MATCH LIST & CARDS */
    .team-item { 
        display: flex; 
        justify-content: space-between; 
        background: #1f2335; 
        padding: 14px; 
        margin: 10px 0; 
        border-radius: 10px; 
        border-left: 4px solid var(--info); 
    }
    
    .match-card { 
        background: #1f2335; 
        padding: 22px; 
        border-radius: 14px; 
        margin-bottom: 25px; 
        border-left: 6px solid var(--accent); 
        position: relative; 
    }
    
    .match-stage { 
        position: absolute; 
        top: -12px; 
        left: 20px; 
        background: var(--accent); 
        color: #000; 
        padding: 3px 12px; 
        border-radius: 6px; 
        font-size: 11px; 
        font-weight: 800; 
    }
    
    .map-row { 
        background: rgba(0,0,0,0.35); 
        padding: 18px; 
        margin: 18px 0; 
        border-radius: 12px; 
        border: 1px solid #3d445e; 
    }
    
    .round-history { 
        font-family: 'Consolas', 'Monaco', monospace; 
        background: #050505; 
        padding: 18px; 
        border-radius: 10px; 
        margin-top: 12px; 
        line-height: 2; 
        font-size: 13px; 
        border: 1px solid #222;
    }
    
    .r-t { color: var(--t-color); font-weight: bold; }
    .r-ct { color: var(--ct-color); font-weight: bold; }

    .badge { 
        padding: 5px 12px; 
        border-radius: 5px; 
        font-size: 11px; 
        font-weight: bold; 
        margin-right: 10px; 
        display: inline-block; 
    }
    
    .badge-t { background: var(--t-color); color: white; }
    .badge-ct { background: var(--ct-color); color: white; }
    
    .veto-box { 
        background: #0a0c14; 
        padding: 18px; 
        border-radius: 10px; 
        font-family: 'Courier New', monospace; 
        font-size: 12.5px; 
        margin-top: 18px; 
        color: #999; 
        border: 1px dashed #444; 
    }
    
    .toggle-veto { 
        color: var(--info); 
        cursor: pointer; 
        font-size: 12px; 
        text-decoration: underline; 
        margin-top: 18px; 
        display: block; 
    }
    
    .top-bar { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        margin-bottom: 25px; 
        background: #0a0c14; 
        padding: 12px 25px; 
        border-radius: 12px; 
        border-bottom: 2px solid #2d334a; 
    }
</style>
</head>
<body>

<div class="container">
    <div id="authSection">
        <h1>ESPORTS MANAGER</h1>
        <div class="sub-title">VERSION 4.16 PRO</div>
        
        <div class="changelog-container">
            <div class="changelog-header">
                <span id="verTitle" class="ver-title"></span>
                <div class="nav-btns">
                    <span class="nav-btn" onclick="changeLog(-1)">←</span>
                    <span class="nav-btn" onclick="changeLog(1)">→</span>
                </div>
            </div>
            <div id="changelogContent" class="changelog-content"></div>
        </div>
        
        <div style="text-align: center;">
            <input type="password" id="pass" placeholder="Пароль администратора">
            <div style="margin-top: 25px;">
                <button onclick="auth(true)">Панель управления</button>
                <button onclick="auth(false)" style="background: #414868; color: white;">Просмотр результатов</button>
            </div>
        </div>
    </div>

    <div id="tourneySection" style="display:none;">
        <button onclick="logout()" style="float:right; background:#444; color:white;">Выход</button>
        <h2>Активные и архивные турниры</h2>
        
        <div id="adminTourneyCreate" style="display:none; margin-bottom:25px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px;">
            <input type="text" id="newTourneyName" placeholder="Название турнира">
            <button onclick="createTourney()">Создать турнир</button>
        </div>
        
        <div id="tourneyList" class="tourney-grid"></div>
    </div>

    <div id="mainPanel" style="display:none;">
        <div class="top-bar">
            <div>Турнир: <b id="activeTourneyName" style="color:var(--accent)"></b></div>
            <div id="tourneyStatusArea"></div>
            <div>
                <button onclick="exitTourney()" style="background:#444; color:white; padding: 6px 14px; font-size:11px; margin-right: 5px;">К списку</button>
                <button onclick="logout()" style="background:var(--danger); color:white; padding: 6px 14px; font-size:11px;">Logout</button>
            </div>
        </div>
        
        <div id="adminContent" style="display:none;">
            <button onclick="finishTourney()" style="background:var(--danger); color:white; font-size:11px; margin-bottom:15px; padding: 8px 15px;">Завершить турнир</button>
            
            <div class="match-card">
                <h3>Управление командами</h3>
                <input type="text" id="tName" placeholder="Название команды">
                <input type="number" id="tPower" placeholder="Сила (0-1000)">
                <button onclick="addTeam()">Добавить</button>
                <div id="teamsDisplay" style="margin-top:15px;"></div>
            </div>
            
            <div class="match-card">
                <h3>Генератор матча</h3>
                <input type="text" id="matchStageName" placeholder="Название стадии (напр. Гранд-Финал)">
                <br>
                <select id="sel1"></select> <span style="color:var(--accent); font-weight:bold;">VS</span> <select id="sel2"></select>
                <select id="bo">
                    <option value="1">Best of 1</option>
                    <option value="3">Best of 3</option>
                    <option value="5">Best of 5</option>
                </select>
                <button onclick="startVeto()" style="background:var(--info); color:white;">Начать Veto</button>
            </div>
            
            <div id="currentSeriesDisplay" style="display:none;" class="match-card" style="border-left-color: var(--info);">
                <h2 id="seriesTitle" style="text-align:center;"></h2>
                <div id="vetoLogLive" class="veto-box" style="color:#eee; border-style: solid;"></div>
                <div id="mapControls" style="text-align:center; margin-top:20px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 10px;"></div>
            </div>
        </div>
        
        <div id="matchHistory"></div>
    </div>
</div>

<script>
// --- INITIALIZATION & FIREBASE ---
const firebaseConfig = {
  apiKey: "AIzaSyDaZmAmodUvLKcPSJ85SImjtBKdAIUUd_s",
  authDomain: "match-simulation.firebaseapp.com",
  databaseURL: "https://match-simulation-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "match-simulation",
  storageBucket: "match-simulation.firebasestorage.app",
  messagingSenderId: "991337782669",
  appId: "1:991337782669:web:addc6ead3cdc08baab71c4"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- MAP POOL DATA ---
const MAP_DATA = { 
    "Mirage": { bonus: 1.5, side: "CT" }, 
    "Inferno": { bonus: 2.8, side: "CT" }, 
    "Nuke": { bonus: 3.5, side: "CT" }, 
    "Ancient": { bonus: 2.2, side: "CT" }, 
    "Anubis": { bonus: 2.0, side: "T" }, 
    "Dust2": { bonus: 0.7, side: "T" }, 
    "Vertigo": { bonus: 1.2, side: "CT" } 
};
const MAP_POOL = Object.keys(MAP_DATA);

// --- CHANGELOG HISTORY ---
const UPDATES = [
    { v: "4.16", items: ["Исправлен критический баг входа в новые турниры (Conflict ID Fix).", "Улучшена сортировка: новые турниры всегда выше, новые архивные — в начале списка архива.", "Корректировка логики выбора сторон при победе в ножевом раунде.", "Расширена структура кода для повышения стабильности."] },
    { v: "4.15", items: ["Интеграция бонусов карт напрямую в шанс победы в раунде.", "Улучшена сортировка турниров (v1).", "Исправлен визуальный баг отображения сторон в Veto при ножевом раунде.", "Полное восстановление истории Changelog."] },
    { v: "4.14", items: ["Исправлен Veto Log для всех форматов: Bo1, Bo3, Bo5.", "В Bo1 возвращена информация о случайном выборе сторон.", "В Bo5 теперь корректно отображаются пики сторон и ножевой раунд.", "Сохранены цветовые индикаторы бонусов карт."] },
    { v: "4.13", items: ["Команды теперь уникальны для каждого турнира.", "Bo3 Veto: Бан-Бан, Пик-Пик, Бан-Бан, Десайдер.", "Вернули бонусы сторон с цветовой подсветкой."] },
    { v: "4.12", items: ["Anti-322: Удаление матчей запрещено.", "Статусы турниров: Идёт/Завершён.", "Названия стадий матчей (Финал, Полуфинал)."] },
    { v: "4.11", items: ["Система вкладок (Турниров).", "Матчи не пересекаются между турнирами.", "Сохранение текущего турнира при обновлении страницы."] },
    { v: "4.10", items: ["Система MR12 и овертаймы каждые 3 раунда.", "Ножевой раунд на десайдере.", "Расширенное Veto для Bo5."] },
    { v: "4.9", items: ["Исправление бага Bo5 (счет 2:1).", "Кнопка Показать/Скрыть Veto в истории."] }
];

let currentLogIdx = 0, teams = [], tournaments = [], matches = [], activeMatch = null;
let currentRole = sessionStorage.getItem("es_role"), currentTourneyId = localStorage.getItem("es_tourney_id");

// --- UTILITY FUNCTIONS ---
function changeLog(dir) { currentLogIdx = (currentLogIdx + dir + UPDATES.length) % UPDATES.length; renderLog(); }
function renderLog() {
    const up = UPDATES[currentLogIdx];
    document.getElementById("verTitle").innerText = "Версия " + up.v;
    document.getElementById("changelogContent").innerHTML = `<ul>${up.items.map(i => `<li>${i}</li>`).join("")}</ul>`;
}
renderLog();

function auth(isAdmin) {
    if(isAdmin && document.getElementById("pass").value !== "1234") return alert("Ошибка доступа!");
    currentRole = isAdmin ? "admin" : "viewer";
    sessionStorage.setItem("es_role", currentRole);
    checkState();
}

function logout() { sessionStorage.clear(); localStorage.clear(); location.reload(); }
function exitTourney() { localStorage.removeItem("es_tourney_id"); currentTourneyId = null; checkState(); }

function checkState() {
    document.getElementById("authSection").style.display = !currentRole ? "block" : "none";
    if(currentRole) {
        if(!currentTourneyId) {
            document.getElementById("tourneySection").style.display = "block";
            document.getElementById("mainPanel").style.display = "none";
            document.getElementById("adminTourneyCreate").style.display = currentRole === "admin" ? "block" : "none";
            loadTournaments();
        } else {
            document.getElementById("tourneySection").style.display = "none";
            document.getElementById("mainPanel").style.display = "block";
            document.getElementById("adminContent").style.display = currentRole === "admin" ? "block" : "none";
            loadTourneyData();
        }
    }
}

// --- TOURNAMENT LOGIC ---
function loadTournaments() {
    db.ref("tournaments").on("value", s => {
        const val = s.val() || {};
        const keys = Object.keys(val);
        
        // ВАЖНО: Восстанавливаем ID из ключей Firebase, чтобы не было конфликта с Date.now()
        tournaments = keys.map(k => {
            let t = val[k];
            // Сохраняем реальный ключ FB для навигации
            t.realId = k; 
            // Сохраняем таймштамп для сортировки
            t.sortTime = t.id || 0; 
            return t;
        });

        // Сортировка v4.16: Сначала Активные (новые выше), потом Завершенные (новые выше)
        tournaments.sort((a,b) => {
            if (a.status === 'active' && b.status !== 'active') return -1;
            if (a.status !== 'active' && b.status === 'active') return 1;
            return b.sortTime - a.sortTime; 
        });

        document.getElementById("tourneyList").innerHTML = tournaments.map(t => `
            <div class="tourney-card ${t.status === 'finished' ? 'finished' : ''}" onclick="selectTourney('${t.realId}')">
                <span class="status-badge ${t.status === 'active' ? 'status-active' : 'status-finished'}">${t.status === 'active' ? '• В эфире' : '✓ Завершен'}</span>
                <br><b style="font-size:1.1em;">${t.name}</b>
                ${currentRole === 'admin' ? `<br><small style="color:var(--danger); opacity:0.6; cursor:pointer;" onclick="event.stopPropagation(); deleteTourney('${t.realId}')">[ Удалить ]</small>` : ''}
            </div>`).join("");
    });
}

function createTourney() { 
    const n = document.getElementById("newTourneyName").value.trim(); 
    if(n) db.ref("tournaments").push({ name: n, status: "active", id: Date.now() }); 
    document.getElementById("newTourneyName").value = "";
}

function deleteTourney(id) { 
    if(confirm("ВНИМАНИЕ: Это удалит турнир, все команды и историю матчей безвозвратно. Продолжить?")) { 
        db.ref("tournaments/"+id).remove(); 
        db.ref("matches/"+id).remove(); 
        db.ref("teams/"+id).remove(); 
    } 
}

function selectTourney(id) { 
    currentTourneyId = id; 
    localStorage.setItem("es_tourney_id", id); 
    checkState(); 
}

function finishTourney() { 
    if(confirm("Завершить этот турнир и перенести в архив?")) {
        db.ref("tournaments/" + currentTourneyId).update({ status: "finished" }); 
    }
}

// --- DATA LOADING ---
function loadTourneyData() {
    db.ref("tournaments/" + currentTourneyId).on("value", s => {
        const t = s.val(); if(!t) return exitTourney();
        document.getElementById("activeTourneyName").innerText = t.name;
        document.getElementById("tourneyStatusArea").innerHTML = t.status === 'active' ? '<span style="color:var(--accent)">[ ТУРНИР ИДЕТ ]</span>' : '<span style="color:var(--danger)">[ АРХИВ ]</span>';
    });
    db.ref("teams/" + currentTourneyId).on("value", s => { teams = s.val() || []; updateSelectors(); });
    db.ref("matches/" + currentTourneyId).on("value", s => { matches = Object.values(s.val() || {}).reverse(); renderHistory(); });
}

function updateSelectors() {
    const d = document.getElementById("teamsDisplay");
    if(d) d.innerHTML = teams.map((t,i)=>`<div class="team-item"><span>${t.name} <small>(${t.power} pwr)</small></span><b onclick="deleteTeam(${i})" style="color:var(--danger);cursor:pointer; padding: 0 5px;">✖</b></div>`).join("");
    const s1 = document.getElementById("sel1"), s2 = document.getElementById("sel2");
    if(s1 && s2) { s1.innerHTML=""; s2.innerHTML=""; teams.forEach((t,i)=>{ s1.add(new Option(t.name,i)); s2.add(new Option(t.name,i)); }); }
}

function addTeam() { 
    let n = document.getElementById("tName"), p = document.getElementById("tPower"); 
    if(n.value && p.value) { teams.push({ name: n.value, power: parseInt(p.value) }); db.ref("teams/" + currentTourneyId).set(teams); n.value=""; p.value=""; } 
}

function deleteTeam(i) { 
    if(confirm("Удалить команду?")) {
        teams.splice(i,1); db.ref("teams/" + currentTourneyId).set(teams); 
    }
}

// --- SIMULATION ENGINE (VETO & MATCHES) ---
function startVeto() {
    let i1 = document.getElementById("sel1").value, i2 = document.getElementById("sel2").value, bo = parseInt(document.getElementById("bo").value), stage = document.getElementById("matchStageName").value.trim();
    if(i1===i2) return alert("Выберите две разные команды для проведения матча.");
    
    let t1 = teams[i1], t2 = teams[i2], pool = [...MAP_POOL], log = [], maps = [];
    const getS = (m, chooser, other) => (MAP_DATA[m].side === "CT" ? {t:other.name, ct:chooser.name} : {t:chooser.name, ct:other.name});

    // Best of 1 Logic
    if(bo == 1) {
        for(let i=0; i<6; i++) log.push(`${(i%2==0?t1.name:t2.name)} забанил ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        let rSide = Math.random()>0.5; 
        maps.push({name:pool[0], t_start: rSide?t1.name:t2.name, ct_start: rSide?t2.name:t1.name});
        log.push(`Финальная карта: ${pool[0]}. Стороны: ${rSide ? t1.name : t2.name} начинает за T.`);
    } 
    // Best of 3 Logic
    else if(bo == 3) {
        log.push(`${t1.name} забанил ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        log.push(`${t2.name} забанил ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        let p1 = pool.splice(Math.floor(Math.random()*pool.length), 1)[0];
        let s1 = getS(p1, t2, t1); maps.push({name:p1, t_start: s1.t, ct_start: s1.ct});
        log.push(`[Карта 1] ${t1.name} выбрал ${p1}. ${t2.name} за ${s1.ct === t2.name ? 'CT' : 'T'}`);
        let p2 = pool.splice(Math.floor(Math.random()*pool.length), 1)[0];
        let s2 = getS(p2, t1, t2); maps.push({name:p2, t_start: s2.t, ct_start: s2.ct});
        log.push(`[Карта 2] ${t2.name} выбрал ${p2}. ${t1.name} за ${s2.ct === t1.name ? 'CT' : 'T'}`);
        log.push(`${t1.name} забанил ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        log.push(`${t2.name} забанил ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        let dec = pool[0]; let kwId = Math.random()>0.5; let kw = kwId?t1.name:t2.name; 
        let side = Math.random()>0.5; 
        maps.push({name:dec, t_start: side?t1.name:t2.name, ct_start: side?t2.name:t1.name});
        let chS = ((kw === t1.name && side) || (kw === t2.name && !side)) ? 'T' : 'CT';
        log.push(`[Десайдер] ${dec}. Ножи: ${kw}. Выбор: ${chS} сторона.`);
    } 
    // Best of 5 Logic
    else {
        log.push(`${t1.name} забанил ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        log.push(`${t2.name} забанил ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        for(let k=1; k<=4; k++){
            let p = pool.splice(Math.floor(Math.random()*pool.length), 1)[0];
            let chooser = (k==1||k==3)?t1:t2; let other = (k==1||k==3)?t2:t1;
            let s = getS(p, other, chooser); maps.push({name:p, t_start: s.t, ct_start: s.ct});
            log.push(`[Карта ${k}] ${chooser.name} выбрал ${p}. ${other.name} за ${s.ct===other.name?'CT':'T'}`);
        }
        let dec = pool[0]; let kw = Math.random()>0.5?t1.name:t2.name; let side = Math.random()>0.5;
        maps.push({name:dec, t_start: side?t1.name:t2.name, ct_start: side?t2.name:t1.name});
        let chS = ((kw === t1.name && side) || (kw === t2.name && !side)) ? 'T' : 'CT';
        log.push(`[Десайдер] ${dec}. Ножи: ${kw}. Выбор: ${chS} сторона.`);
    }

    activeMatch = { t1, t2, maps, bo, results: [], currentMapIdx: 0, wins1: 0, wins2: 0, veto: log, id: Date.now(), stage };
    db.ref(`matches/${currentTourneyId}/${activeMatch.id}`).set({ id: activeMatch.id, t1: t1.name, p1: t1.power, t2: t2.name, p2: t2.power, total: "0:0", bo, details: [], veto: log, stage });
    document.getElementById("currentSeriesDisplay").style.display = "block";
    renderActiveMatch();
}

function renderActiveMatch() {
    const am = activeMatch; if(!am) return;
    document.getElementById("seriesTitle").innerText = `${am.t1.name} vs ${am.t2.name} [${am.wins1}:${am.wins2}]`;
    document.getElementById("vetoLogLive").innerHTML = "<b>ПРОЦЕСС VETO:</b><br>" + am.veto.join("<br>");
    let cur = am.maps[am.currentMapIdx];
    document.getElementById("mapControls").innerHTML = `<p style="font-size:1.2em;">Текущая карта: <b style="color:var(--info)">${cur.name}</b></p><button onclick="playNextMap()">Запустить симуляцию карты</button>`;
}

function playNextMap() {
    let am = activeMatch, mObj = am.maps[am.currentMapIdx];
    let res = simulateMap(am.t1, am.t2, mObj);
    
    am.results.push({ 
        name: mObj.name, 
        score: `${res.r1}:${res.r2}`, 
        rounds: res.history_styled, 
        t_start: mObj.t_start, 
        ct_start: mObj.ct_start, 
        sideBonus: MAP_DATA[mObj.name].side, 
        bonus: MAP_DATA[mObj.name].bonus 
    });

    if(res.r1 > res.r2) am.wins1++; else am.wins2++;
    am.currentMapIdx++;

    db.ref(`matches/${currentTourneyId}/${am.id}`).update({ total: `${am.wins1}:${am.wins2}`, details: am.results });
    
    if(am.wins1 >= Math.ceil(am.bo/2) || am.wins2 >= Math.ceil(am.bo/2)) { 
        activeMatch = null; 
        document.getElementById("currentSeriesDisplay").style.display="none"; 
    } else {
        renderActiveMatch();
    }
}

function simulateMap(t1, t2, m) {
    let r1=0, r2=0, l1=0, l2=0, h=[]; 
    let b = MAP_DATA[m.name].bonus; 
    let sideStrong = MAP_DATA[m.name].side;
    let t1T = (m.t_start === t1.name);

    for(let r=0; r<65; r++){
        let t1IsT = (r < 12) ? t1T : !t1T; 
        if(r >= 24) t1IsT = (Math.floor((r-24)/3) % 2 === 0) ? t1T : !t1T;

        // MATH: Skill Difference
        let c1 = (t1.power / (t1.power + t2.power)) * 100;
        
        // MATH: Map Side Bonus (v4.15/4.16)
        if (sideStrong === "CT") {
            if (!t1IsT) c1 += b; else c1 -= b; 
        } else {
            if (t1IsT) c1 += b; else c1 -= b;
        }

        // MATH: Economy / Momentum (3.2% per round)
        c1 -= (l1 * 3.2); c1 += (l2 * 3.2);

        // Round Outcome
        if(Math.random() * 100 < c1) { 
            r1++; l1=0; l2 = Math.min(l2+1, 4); 
        } else { 
            r2++; l2=0; l1 = Math.min(l1+1, 4); 
        }
        
        h.push(`<span class="${t1IsT?'r-t':'r-ct'}">${r1}</span>:<span class="${t1IsT?'r-ct':'r-t'}">${r2}</span>`);
        if(r===12||(r>=24&&(r-24)%3===0)) h.push("<br>");
        
        // Win Conditions (MR12)
        if((r1===13&&r2<12)||(r2===13&&r1<12)) break;
        if(r1>=12&&r2>=12){ 
            let lim=16; while(r1>lim-1&&r2>lim-1) lim+=3; 
            if((r1===lim&&Math.abs(r1-r2)>=2)||(r2===lim&&Math.abs(r2-r1)>=2)) break; 
        }
    }
    return {r1, r2, history_styled: h};
}

function renderHistory() {
    document.getElementById("matchHistory").innerHTML = matches.map(m => `
        <div class="match-card">
            ${m.stage ? `<div class="match-stage">${m.stage}</div>` : ''}
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:1.1em;"><b>${m.t1}</b> vs <b>${m.t2}</b> <small style="opacity:0.6;">(Bo${m.bo})</small></span>
                <b style="color:var(--accent); font-size:1.6em; font-family: monospace;">${m.total}</b>
            </div>
            ${(m.details || []).map(d => `
                <div class="map-row">
                    <div style="display:flex; justify-content:space-between; border-bottom: 1px solid #444; padding-bottom: 5px; margin-bottom: 10px;">
                        <b>📍 ${d.name}</b> 
                        <b style="color:var(--accent)">${d.score}</b>
                    </div>
                    <div style="margin:8px 0; font-size:11px;">
                        <span class="badge badge-t">T: ${d.t_start}</span>
                        <span class="badge badge-ct">CT: ${d.ct_start}</span>
                        <span class="badge" style="background:#222; border: 1px solid #444;">Преимущество: <span style="color:${d.sideBonus==='CT'?'var(--ct-color)':'var(--t-color)'}">${d.sideBonus}</span> (+${d.bonus}%)</span>
                    </div>
                    <div class="round-history">${d.rounds.join(" ")}</div>
                </div>
            `).join("")}
            <span class="toggle-veto" onclick="let b=this.nextElementSibling; b.style.display=b.style.display==='none'?'block':'none'">[ Показать логи Veto ]</span>
            <div class="veto-box" style="display:none">${m.veto.join("<br>")}</div>
        </div>`).join("");
}

// BOOTSTRAP
checkState();
</script>
