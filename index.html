<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Esports Manager Pro - Advanced Match Simulation System">
<meta name="version" content="5.0.0">
<meta name="author" content="Gemini AI Collaboration">
<title>MATCH SIMULATION v5.0.0 ULTRA</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
    /* GLOBAL THEME DEFINITIONS - KEEPING 4.17.3 STYLE */
    :root { 
        --bg: #0f111a; 
        --card: #161925; 
        --text: #e0e0e0; 
        --accent: #00ff41; 
        --danger: #ff4b2b; 
        --info: #00b4ff; 
        --t-color: #ff9800; 
        --ct-color: #4a90e2; 
        --shadow: 0 15px 45px rgba(0,0,0,0.7);
        --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* ANIMATIONS */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0,255,65,0.4); } 70% { box-shadow: 0 0 0 10px rgba(0,255,65,0); } 100% { box-shadow: 0 0 0 0 rgba(0,255,65,0); } }

    body { 
        font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; 
        background: var(--bg); 
        color: var(--text); 
        margin: 0; 
        padding: 20px; 
        line-height: 1.6; 
        overflow-x: hidden;
    }

    .container { 
        max-width: 950px; 
        margin: 20px auto; 
        background: var(--card); 
        padding: 40px; 
        border-radius: 24px; 
        border: 1px solid rgba(255,255,255,0.08); 
        box-shadow: var(--shadow); 
        animation: fadeIn 0.6s ease-out;
    }
    
    h1 { 
        color: var(--accent); 
        margin: 0; 
        text-align: center; 
        letter-spacing: 5px; 
        text-transform: uppercase; 
        font-size: 2.5em; 
        font-weight: 900;
        text-shadow: 0 0 20px rgba(0,255,65,0.2);
    }
    
    .sub-title { 
        color: var(--info); 
        text-align: center; 
        font-weight: bold; 
        letter-spacing: 8px; 
        margin-bottom: 35px; 
        font-size: 0.9em; 
        text-transform: uppercase;
        opacity: 0.7;
    }

    /* ULTRA 5.0 NEW UI COMPONENTS */
    .player-editor-box {
        background: rgba(0,0,0,0.3);
        border: 1px solid #2d334a;
        padding: 20px;
        border-radius: 15px;
        margin-top: 15px;
        animation: fadeIn 0.4s ease;
    }

    .player-row {
        display: grid;
        grid-template-columns: 2fr 1.5fr 1fr 0.5fr;
        gap: 10px;
        margin-bottom: 10px;
        align-items: center;
    }

    .economy-label {
        font-size: 9px;
        padding: 2px 6px;
        border-radius: 4px;
        font-weight: 900;
        margin-left: 5px;
        text-transform: uppercase;
    }
    .eco-tag { background: var(--danger); color: white; }
    .force-tag { background: var(--info); color: white; }
    .full-tag { background: var(--accent); color: black; }

    .phase-badge {
        font-size: 10px;
        opacity: 0.6;
        margin-left: 10px;
        font-style: italic;
    }

    /* CHANGELOG MODULE STYLING */
    .changelog-container { 
        background: linear-gradient(145deg, #0a0c14, #121520); 
        border: 1px solid #2d334a; 
        padding: 25px; 
        border-radius: 18px; 
        margin-bottom: 40px; 
        border-left: 6px solid var(--accent); 
        position: relative;
    }
    
    .changelog-header { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        margin-bottom: 20px; 
    }
    
    .nav-btns { display: flex; gap: 15px; }
    
    .nav-btn { 
        width: 42px; 
        height: 42px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        background: #1f2335; 
        border: 1px solid #414868; 
        border-radius: 12px; 
        cursor: pointer; 
        color: var(--accent); 
        transition: var(--transition); 
        font-weight: bold; 
        font-size: 22px; 
    }
    
    .nav-btn:hover { 
        background: var(--accent); 
        color: #000; 
        transform: scale(1.05) rotate(5deg);
    }
    
    .changelog-content { font-size: 14px; color: #a0a0a0; }
    .changelog-content ul { padding-left: 25px; margin: 12px 0; list-style-type: square; }
    .changelog-content li { margin-bottom: 7px; }
    .ver-title { color: var(--info); font-weight: 800; font-size: 1.3em; text-transform: uppercase; }

    /* FORM COMPONENTS */
    input, select { 
        background: #1f2335; 
        border: 2px solid #2d334a; 
        color: white; 
        padding: 14px 18px; 
        border-radius: 12px; 
        margin: 8px; 
        font-size: 14px; 
        outline: none;
        transition: var(--transition);
    }
    
    input:focus, select:focus { border-color: var(--info); background: #252a3f; }
    
    button { 
        background: var(--accent); 
        color: #000; 
        border: none; 
        padding: 14px 30px; 
        border-radius: 12px; 
        cursor: pointer; 
        font-weight: 900; 
        text-transform: uppercase; 
        transition: var(--transition); 
        box-shadow: 0 4px 0px rgba(0,0,0,0.2);
    }
    
    button:hover { 
        filter: brightness(1.15); 
        transform: translateY(-3px); 
        box-shadow: 0 8px 20px rgba(0,255,65,0.25);
    }
    
    button:active { transform: translateY(-1px); }

    /* TOURNAMENT INTERFACE */
    .tourney-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
        gap: 20px; 
        margin-top: 30px; 
    }
    
    .tourney-card { 
        background: linear-gradient(135deg, #1f2335, #161925); 
        padding: 30px; 
        border-radius: 20px; 
        border: 1px solid #2d334a; 
        text-align: center; 
        cursor: pointer; 
        transition: var(--transition); 
        position: relative; 
    }
    
    .tourney-card:hover { 
        border-color: var(--accent); 
        transform: translateY(-8px); 
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    
    .tourney-card.finished { 
        opacity: 0.7; 
        filter: grayscale(0.4);
        background: #0d1017;
    }
    
    .status-badge { 
        font-size: 10px; 
        text-transform: uppercase; 
        padding: 4px 12px; 
        border-radius: 20px; 
        margin-bottom: 15px; 
        display: inline-block; 
        font-weight: 800;
        letter-spacing: 1px;
    }
    
    .status-active { background: rgba(0, 255, 65, 0.1); color: var(--accent); border: 1px solid var(--accent); animation: pulse 2s infinite; }
    .status-finished { background: rgba(255, 75, 43, 0.1); color: var(--danger); border: 1px solid var(--danger); }

    /* MATCH STYLES */
    .team-item { 
        display: flex; 
        justify-content: space-between; 
        background: rgba(255,255,255,0.03); 
        padding: 16px; 
        margin: 12px 0; 
        border-radius: 14px; 
        border-left: 5px solid var(--info); 
        transition: 0.2s;
        cursor: pointer;
    }
    
    .team-item:hover { background: rgba(255,255,255,0.06); }
    
    .match-card { 
        background: #1f2335; 
        padding: 28px; 
        border-radius: 20px; 
        margin-bottom: 30px; 
        border-left: 8px solid var(--accent); 
        position: relative; 
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    
    .match-stage { 
        position: absolute; 
        top: -14px; 
        left: 25px; 
        background: var(--accent); 
        color: #000; 
        padding: 4px 16px; 
        border-radius: 8px; 
        font-size: 11px; 
        font-weight: 900; 
        box-shadow: 0 4px 10px rgba(0,255,65,0.3);
    }
    
    .map-row { 
        background: rgba(0,0,0,0.4); 
        padding: 22px; 
        margin: 22px 0; 
        border-radius: 16px; 
        border: 1px solid #33394d; 
    }
    
    .round-history { 
        font-family: 'Fira Code', 'Cascadia Code', monospace; 
        background: #050505; 
        padding: 20px; 
        border-radius: 12px; 
        margin-top: 15px; 
        line-height: 2.2; 
        font-size: 13px; 
        color: #ddd;
        border: 1px solid #1a1a1a;
    }
    
    .r-t { color: var(--t-color); font-weight: bold; }
    .r-ct { color: var(--ct-color); font-weight: bold; }

    .badge { 
        padding: 6px 14px; 
        border-radius: 7px; 
        font-size: 11px; 
        font-weight: 800; 
        margin-right: 12px; 
        display: inline-block; 
        text-transform: uppercase;
    }
    
    .badge-t { background: var(--t-color); color: white; }
    .badge-ct { background: var(--ct-color); color: white; }
    
    .veto-box { 
        background: #080a0f; 
        padding: 20px; 
        border-radius: 12px; 
        font-family: 'JetBrains Mono', monospace; 
        font-size: 13px; 
        margin-top: 20px; 
        color: #94a3b8; 
        border: 1px dashed #334155; 
        line-height: 1.8;
    }
    
    .toggle-veto { 
        color: var(--info); 
        cursor: pointer; 
        font-size: 12px; 
        text-decoration: underline; 
        margin-top: 20px; 
        display: block; 
        font-weight: 600;
    }
    
    .top-bar { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        margin-bottom: 30px; 
        background: #0a0c14; 
        padding: 15px 30px; 
        border-radius: 16px; 
        border: 1px solid #2d334a; 
    }
</style>
</head>
<body>

<div class="container">
    <div id="authSection">
        <h1>MATCH SIMULATION</h1>
        <div class="sub-title">VERSION 5.0.0 ULTRA</div>
        
        <div class="changelog-container">
            <div class="changelog-header">
                <span id="verTitle" class="ver-title"></span>
                <div class="nav-btns">
                    <span class="nav-btn" onclick="changeLog(-1)">←</span>
                    <span class="nav-btn" onclick="changeLog(1)">→</span>
                </div>
            </div>
            <div id="changelogContent" class="changelog-content"></div>
        </div>
        
        <div style="text-align: center; background: rgba(255,255,255,0.02); padding: 30px; border-radius: 20px;">
            <input type="password" id="pass" placeholder="Ключ доступа администратора">
            <div style="margin-top: 30px;">
                <button onclick="auth(true)">Панель управления</button>
                <button onclick="auth(false)" style="background: #414868; color: white; margin-left: 10px;">Режим зрителя</button>
            </div>
        </div>
    </div>

    <div id="tourneySection" style="display:none;">
        <button onclick="logout()" style="float:right; background:#333; color:white; font-size:12px;">Выйти из системы</button>
        <h2 style="margin-top:0;">Навигатор турниров</h2>
        
        <div id="adminTourneyCreate" style="display:none; margin-bottom:30px; background: rgba(0,180,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(0,180,255,0.2);">
            <input type="text" id="newTourneyName" placeholder="Название нового ивента">
            <button onclick="createTourney()">Создать турнир</button>
        </div>
        
        <div id="tourneyList" class="tourney-grid"></div>
    </div>

    <div id="mainPanel" style="display:none;">
        <div class="top-bar">
            <div>Текущий ивент: <b id="activeTourneyName" style="color:var(--accent); font-size:1.1em;"></b></div>
            <div id="tourneyStatusArea"></div>
            <div>
                <button onclick="exitTourney()" style="background:#444; color:white; padding: 8px 16px; font-size:11px; border-radius: 8px;">Назад</button>
                <button onclick="logout()" style="background:var(--danger); color:white; padding: 8px 16px; font-size:11px; border-radius: 8px; margin-left:5px;">Выход</button>
            </div>
        </div>
        
        <div id="adminContent" style="display:none;">
            <div style="display:flex; justify-content: flex-end; margin-bottom: 20px;">
                <button onclick="finishTourney()" style="background:var(--danger); color:white; font-size:10px; padding: 6px 12px; letter-spacing:1px;">Архивировать турнир</button>
            </div>
            
            <div class="match-card">
                <h3><span style="color:var(--info)">01.</span> Ростер команд и игроков</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: center;">
                    <input type="text" id="tName" placeholder="Имя команды">
                    <input type="hidden" id="tPower" value="0"> <button onclick="addTeam()" style="height: 50px;">Добавить команду</button>
                </div>
                <div id="teamsDisplay" style="margin-top:20px;"></div>
                
                <div id="playerEditor" class="player-editor-box" style="display:none;">
                    <h4 id="editingTeamName" style="color:var(--accent); margin-top:0;">Редактирование состава</h4>
                    <div id="playerList"></div>
                    <div class="player-row">
                        <input type="text" id="pNick" placeholder="Ник игрока">
                        <select id="pRole">
                            <option value="Captain">Капитан</option>
                            <option value="Sniper">Снайпер</option>
                            <option value="Rifler">Рифлер</option>
                            <option value="Support">Саппорт</option>
                            <option value="Lurker">Люркер</option>
                        </select>
                        <input type="number" id="pPower" placeholder="Сила (1-100)" value="50">
                        <button onclick="savePlayer()" style="padding: 10px;">+</button>
                    </div>
                    <button onclick="closePlayerEditor()" style="background:#444; color:white; width:100%; margin-top:10px;">Закрыть</button>
                </div>
            </div>
            
            <div class="match-card">
                <h3><span style="color:var(--info)">02.</span> Планировщик матчей</h3>
                <input type="text" id="matchStageName" placeholder="Этап (Группы / Плей-офф / Финал)" style="width: 95%;">
                <br>
                <div style="display: flex; align-items: center; justify-content: center; margin: 15px 0;">
                    <select id="sel1"></select> 
                    <span style="margin: 0 15px; font-weight: 900; color: var(--accent);">VS</span> 
                    <select id="sel2"></select>
                </div>
                <div style="text-align: center;">
                    <select id="bo" style="width: 200px;">
                        <option value="1">Best of 1</option>
                        <option value="3">Best of 3</option>
                        <option value="5">Best of 5</option>
                    </select>
                    <button onclick="startVeto()" style="background:var(--info); color:white; margin-left:10px;">Запустить Veto</button>
                </div>
            </div>
            
            <div id="currentSeriesDisplay" style="display:none;" class="match-card">
                <div class="match-stage" style="background: var(--info);">Live Simulation</div>
                <h2 id="seriesTitle" style="text-align:center; margin: 10px 0 25px 0; font-size: 1.8em;"></h2>
                <div id="vetoLogLive" class="veto-box"></div>
                <div id="mapControls" style="text-align:center; margin-top:25px;"></div>
            </div>
        </div>
        
        <div id="matchHistory"></div>
    </div>
</div>

<script>
/* ========================================================================
   ULTRA ENGINE JAVASCRIPT - v5.0.0
   ======================================================================== */

const firebaseConfig = {
  apiKey: "AIzaSyDaZmAmodUvLKcPSJ85SImjtBKdAIUUd_s",
  authDomain: "match-simulation.firebaseapp.com",
  databaseURL: "https://match-simulation-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "match-simulation",
  storageBucket: "match-simulation.firebasestorage.app",
  messagingSenderId: "991337782669",
  appId: "1:991337782669:web:addc6ead3cdc08baab71c4"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const MAP_DATA = { 
    "Mirage": { bonus: 1.5, side: "CT" }, 
    "Inferno": { bonus: 2.8, side: "CT" }, 
    "Nuke": { bonus: 3.5, side: "CT" }, 
    "Ancient": { bonus: 2.2, side: "CT" }, 
    "Anubis": { bonus: 2.0, side: "T" }, 
    "Dust2": { bonus: 0.7, side: "T" }, 
    "Vertigo": { bonus: 1.2, side: "CT" } 
};
const MAP_POOL = Object.keys(MAP_DATA);

const UPDATES = [
    { v: "5.0.0", items: ["ULTRA Update: Добавлена система экономики CS2 (Money, Eco, Force, Full).", "Ростеры игроков: теперь в команде 5 игроков с уникальными ролями.", "Система фаз: раунд делится на Entry, Mid-round и Clutch.", "Пошаговая симуляция: кнопка симуляции по 1 раунду.", "Сила команды теперь автоматически считается от суммы сил игроков."] },
    { v: "4.17.3", items: ["Исправлен визуальный баг с двойным переносом строк (MR12).", "Оптимизирована сетка овертаймов: теперь перенос происходит строго каждые 3 раунда."] },
    { v: "4.17.2", items: ["Исправление бага с входом для зрителей."]},
    { v: "4.17", items: ["В историю матчей добавлено отображение силы команд.", "Исправлен баг выбора сторон после ножей."] }
];

let currentLogIdx = 0, teams = [], tournaments = [], matches = [], activeMatch = null;
let currentRole = sessionStorage.getItem("es_role"), currentTourneyId = localStorage.getItem("es_tourney_id");
let editingTeamIdx = null; // Для менеджера игроков
let currentLiveMapState = null; // Для пошаговой симуляции

// --- NAVIGATION & AUTH ---
function changeLog(dir) { currentLogIdx = (currentLogIdx + dir + UPDATES.length) % UPDATES.length; renderLog(); }
function renderLog() {
    const up = UPDATES[currentLogIdx];
    document.getElementById("verTitle").innerText = "Version " + up.v;
    document.getElementById("changelogContent").innerHTML = `<ul>${up.items.map(i => `<li>${i}</li>`).join("")}</ul>`;
}
renderLog();

function auth(isAdmin) {
    const _access_vault = "UEFSQUxMQVgzOTUwUA==";
    if (isAdmin === true) {
        let inputPass = document.getElementById("pass").value;
        if (btoa(inputPass) === _access_vault) {
            currentRole = "admin";
            sessionStorage.setItem("es_role", "admin");
            checkState();
            return;
        } else return alert("Доступ заблокирован.");
    }
    currentRole = "viewer";
    sessionStorage.setItem("es_role", "viewer");
    checkState();
}

function logout() { sessionStorage.clear(); localStorage.clear(); location.reload(); }
function exitTourney() { localStorage.removeItem("es_tourney_id"); currentTourneyId = null; checkState(); }

function checkState() {
    const authUI = document.getElementById("authSection"), tourneyUI = document.getElementById("tourneySection"), mainUI = document.getElementById("mainPanel"), adminUI = document.getElementById("adminContent");
    authUI.style.display = !currentRole ? "block" : "none";
    if(currentRole) {
        if(!currentTourneyId) {
            tourneyUI.style.display = "block";
            mainUI.style.display = "none";
            document.getElementById("adminTourneyCreate").style.display = currentRole === "admin" ? "block" : "none";
            loadTournaments();
        } else {
            tourneyUI.style.display = "none";
            mainUI.style.display = "block";
            adminUI.style.display = currentRole === "admin" ? "block" : "none";
            loadTourneyData();
        }
    }
}

// --- TOURNAMENT MANAGEMENT ---
function loadTournaments() {
    db.ref("tournaments").on("value", s => {
        const val = s.val() || {};
        tournaments = Object.keys(val).map(k => ({...val[k], realId: k})).sort((a,b) => (a.status === 'active' ? -1 : 1) || b.id - a.id);
        document.getElementById("tourneyList").innerHTML = tournaments.map(t => `
            <div class="tourney-card ${t.status === 'finished' ? 'finished' : ''}" onclick="selectTourney('${t.realId}')">
                <span class="status-badge ${t.status === 'active' ? 'status-active' : 'status-finished'}">${t.status === 'active' ? '• Активен' : '✓ В архиве'}</span>
                <br><b>${t.name}</b>
            </div>`).join("");
    });
}

function createTourney() { 
    const n = document.getElementById("newTourneyName").value.trim(); 
    if(n) db.ref("tournaments").push({ name: n, status: "active", id: Date.now() }); 
    document.getElementById("newTourneyName").value = "";
}

function selectTourney(id) { currentTourneyId = id; localStorage.setItem("es_tourney_id", id); checkState(); }
function finishTourney() { if(confirm("В архив?")) db.ref("tournaments/" + currentTourneyId).update({ status: "finished" }); }

// --- TEAM & PLAYER ENGINE ---
function loadTourneyData() {
    db.ref("tournaments/" + currentTourneyId).on("value", s => {
        const t = s.val(); if(!t) return exitTourney();
        document.getElementById("activeTourneyName").innerText = t.name;
    });
    db.ref("teams/" + currentTourneyId).on("value", s => { teams = s.val() || []; updateSelectors(); });
    db.ref("matches/" + currentTourneyId).on("value", s => { matches = Object.values(s.val() || {}).reverse(); renderHistory(); });
}

function updateSelectors() {
    const d = document.getElementById("teamsDisplay");
    if(d) d.innerHTML = teams.map((t,i)=>`
        <div class="team-item" onclick="openPlayerEditor(${i})">
            <span><b>${t.name}</b> <small style="color:var(--info)">[Players: ${(t.players||[]).length}/5 | Power: ${calculateTeamPower(t)}]</small></span>
            <b onclick="event.stopPropagation(); deleteTeam(${i})" style="color:var(--danger); font-size:18px;">×</b>
        </div>`).join("");
    const s1 = document.getElementById("sel1"), s2 = document.getElementById("sel2");
    if(s1 && s2) { s1.innerHTML=""; s2.innerHTML=""; teams.forEach((t,i)=>{ s1.add(new Option(t.name,i)); s2.add(new Option(t.name,i)); }); }
}

function addTeam() { 
    let n = document.getElementById("tName"); 
    if(n.value) { teams.push({ name: n.value, power: 0, players: [] }); db.ref("teams/" + currentTourneyId).set(teams); n.value=""; } 
}

function deleteTeam(i) { if(confirm("Удалить?")) { teams.splice(i,1); db.ref("teams/" + currentTourneyId).set(teams); } }

function openPlayerEditor(idx) {
    editingTeamIdx = idx;
    const t = teams[idx];
    document.getElementById("playerEditor").style.display = "block";
    document.getElementById("editingTeamName").innerText = "Состав: " + t.name;
    renderPlayers();
}

function closePlayerEditor() { document.getElementById("playerEditor").style.display = "none"; editingTeamIdx = null; }

function renderPlayers() {
    const t = teams[editingTeamIdx];
    const list = document.getElementById("playerList");
    list.innerHTML = (t.players || []).map((p, i) => `
        <div class="player-row" style="background:rgba(255,255,255,0.05); padding:5px; border-radius:8px;">
            <div style="font-weight:bold;">${p.nick}</div>
            <div style="color:var(--info); font-size:11px;">${p.role}</div>
            <div style="color:var(--accent);">${p.power}</div>
            <button onclick="removePlayer(${i})" style="padding:2px 8px; background:var(--danger);">-</button>
        </div>
    `).join("");
}

function savePlayer() {
    const t = teams[editingTeamIdx];
    if(!t.players) t.players = [];
    if(t.players.length >= 5) return alert("В команде может быть только 5 игроков.");
    
    const nick = document.getElementById("pNick").value;
    const role = document.getElementById("pRole").value;
    const pow = parseInt(document.getElementById("pPower").value);
    
    if(nick && pow) {
        t.players.push({ nick, role, power: pow });
        t.power = calculateTeamPower(t);
        db.ref("teams/" + currentTourneyId).set(teams);
        document.getElementById("pNick").value = "";
        renderPlayers();
    }
}

function removePlayer(idx) {
    teams[editingTeamIdx].players.splice(idx, 1);
    teams[editingTeamIdx].power = calculateTeamPower(teams[editingTeamIdx]);
    db.ref("teams/" + currentTourneyId).set(teams);
    renderPlayers();
}

function calculateTeamPower(team) {
    if(!team.players || team.players.length === 0) return 0;
    return team.players.reduce((sum, p) => sum + p.power, 0);
}

// --- ULTRA 5.0 CORE SIMULATION ENGINE ---
function conductUltraRound(t1, t2, mObj, state) {
    // 1. ИНИЦИАЛИЗАЦИЯ СТОРОН
    let t1IsT = (state.r < 12) ? state.t1T : !state.t1T; 
    if(state.r >= 24) t1IsT = (Math.floor((state.r-24)/3) % 2 === 0) ? state.t1T : !state.t1T;
    
    // 2. ЭКОНОМИКА (CS2 Style)
    // Типы закупов на основе бюджета
    const getBuyType = (money) => {
        if(money >= 3900) return { type: "FULL", mult: 1.0 };
        if(money >= 2100) return { type: "FORCE", mult: 0.75 };
        return { type: "ECO", mult: 0.45 };
    };

    let buy1 = getBuyType(state.m1);
    let buy2 = getBuyType(state.m2);

    // 3. БАЗОВЫЕ ШАНСЫ
    let p1 = calculateTeamPower(t1);
    let p2 = calculateTeamPower(t2);
    let baseChance = (p1 / (p1 + p2)) * 100;
    
    // Бонус карты
    let sideStrong = MAP_DATA[mObj.name].side;
    let b = MAP_DATA[mObj.name].bonus;
    if (sideStrong === "CT") { if (!t1IsT) baseChance += b; else baseChance -= b; } 
    else { if (t1IsT) baseChance += b; else baseChance -= b; }

    // Влияние экономики
    let finalChance = baseChance;
    if(buy1.type === "FULL" && buy2.type === "ECO") finalChance += 35;
    if(buy1.type === "ECO" && buy2.type === "FULL") finalChance -= 35;
    if(buy1.type === "FORCE" && buy2.type === "FULL") finalChance -= 15;

    // 4. ТРИ СТАДИИ РАУНДА (Micro-events)
    let phaseLog = "";
    
    // Phase 1: Entry
    // Снайперы и Рифлеры влияют на первый контакт
    let t1Entry = (t1.players || []).filter(p => p.role === "Sniper" || p.role === "Rifler").reduce((s,p)=>s+p.power, 0);
    let t2Entry = (t2.players || []).filter(p => p.role === "Sniper" || p.role === "Rifler").reduce((s,p)=>s+p.power, 0);
    let entryDuel = (Math.random() * (t1Entry + t2Entry)) < t1Entry;
    
    if(entryDuel) { 
        finalChance += 12; 
        phaseLog = "Entry OK"; 
    } else { 
        finalChance -= 12; 
        phaseLog = "Entry LOST"; 
    }

    // Phase 2: Mid-round
    // Капитаны дают бонус к координации
    let cap1 = (t1.players || []).find(p => p.role === "Captain")?.power || 0;
    let cap2 = (t2.players || []).find(p => p.role === "Captain")?.power || 0;
    finalChance += (cap1 * 0.05) - (cap2 * 0.05);

    // Phase 3: Result
    let win1 = (Math.random() * 100) < finalChance;
    
    // 5. НАЧИСЛЕНИЕ ДЕНЕГ
    const winMoney = 3250;
    const lossBase = 1400;
    
    if(win1) {
        state.r1++; state.l1 = 0; state.l2 = Math.min(state.l2 + 1, 4);
        state.m1 += winMoney;
        state.m2 += lossBase + (state.l2 * 500);
    } else {
        state.r2++; state.l2 = 0; state.l1 = Math.min(state.l1 + 1, 4);
        state.m2 += winMoney;
        state.m1 += lossBase + (state.l1 * 500);
    }

    // Ограничение денег
    state.m1 = Math.min(state.m1, 16000);
    state.m2 = Math.min(state.m2, 16000);

    // Запись в историю
    let ecoLabel1 = `<span class="economy-label ${buy1.type.toLowerCase()}-tag">${buy1.type}</span>`;
    let ecoLabel2 = `<span class="economy-label ${buy2.type.toLowerCase()}-tag">${buy2.type}</span>`;
    state.h.push(`<span class="${t1IsT?'r-t':'r-ct'}">${state.r1}</span>:<span class="${t1IsT?'r-ct':'r-t'}">${state.r2}</span> ${ecoLabel1}${ecoLabel2} <span class="phase-badge">${phaseLog}</span>`);
    
    if (state.r === 11 || (state.r >= 23 && (state.r - 23) % 3 === 0)) {
        state.h.push("<br>");
        // Сброс денег при смене сторон
        state.m1 = 800; state.m2 = 800; state.l1 = 0; state.l2 = 0;
    }
    
    state.r++;
    return state;
}

// --- VETO & UI ---
function startVeto() {
    let i1 = document.getElementById("sel1").value, i2 = document.getElementById("sel2").value, bo = parseInt(document.getElementById("bo").value), stage = document.getElementById("matchStageName").value.trim();
    if(i1===i2) return alert("Команды одинаковые.");
    
    let t1 = teams[i1], t2 = teams[i2], pool = [...MAP_POOL], log = [], maps = [];
    // (Стандартная логика Veto из 4.17.3...)
    if(bo == 1) {
        for(let i=0; i<6; i++) log.push(`${(i%2==0?t1.name:t2.name)} забанил ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        let rSide = Math.random()>0.5; maps.push({name:pool[0], t_start: rSide?t1.name:t2.name, ct_start: rSide?t2.name:t1.name});
    } else {
        log.push(`${t1.name} бан ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        log.push(`${t2.name} бан ${pool.splice(Math.floor(Math.random()*pool.length), 1)[0]}`);
        maps.push({name: pool.splice(0,1)[0], t_start: t1.name, ct_start: t2.name});
        maps.push({name: pool.splice(0,1)[0], t_start: t2.name, ct_start: t1.name});
        maps.push({name: pool[0], t_start: t1.name, ct_start: t2.name});
    }

    activeMatch = { t1, t2, maps, bo, results: [], currentMapIdx: 0, wins1: 0, wins2: 0, veto: log, id: Date.now(), stage };
    db.ref(`matches/${currentTourneyId}/${activeMatch.id}`).set({ id: activeMatch.id, t1: t1.name, p1: calculateTeamPower(t1), t2: t2.name, p2: calculateTeamPower(t2), total: "0:0", bo, details: [], veto: log, stage });
    document.getElementById("currentSeriesDisplay").style.display = "block";
    renderActiveMatch();
}

function renderActiveMatch() {
    const am = activeMatch; if(!am) return;
    document.getElementById("seriesTitle").innerText = `${am.t1.name} [${am.wins1}:${am.wins2}] ${am.t2.name}`;
    let cur = am.maps[am.currentMapIdx];
    document.getElementById("mapControls").innerHTML = `
        <p>Текущая карта: <b style="color:var(--accent)">${cur.name}</b></p>
        <button onclick="playNextMapFull()" style="margin-right:10px;">Вся карта сразу</button>
        <button onclick="playOneRoundStep()" style="background:var(--info); color:white;">+1 Раунд</button>
    `;
}

function playOneRoundStep() {
    let am = activeMatch, mObj = am.maps[am.currentMapIdx];
    if(!currentLiveMapState) {
        currentLiveMapState = { r1:0, r2:0, l1:0, l2:0, r:0, h:[], m1: 800, m2: 800, t1T: (mObj.t_start === am.t1.name) };
    }

    currentLiveMapState = conductUltraRound(am.t1, am.t2, mObj, currentLiveMapState);
    
    // Обновляем визуализацию
    document.getElementById("seriesTitle").innerText = `${am.t1.name} [${am.wins1}:${am.wins2}] ${am.t2.name} | Текущий счет: ${currentLiveMapState.r1}:${currentLiveMapState.r2}`;

    // Проверка конца карты
    let s = currentLiveMapState;
    let isEnd = false;
    if((s.r1===13 && s.r2<12) || (s.r2===13 && s.r1<12)) isEnd = true;
    if(s.r1>=12 && s.r2>=12){ 
        let lim=16; while(s.r1>lim-1 && s.r2>lim-1) lim+=3; 
        if((s.r1===lim && Math.abs(s.r1-s.r2)>=2) || (s.r2===lim && Math.abs(s.r2-s.r1)>=2)) isEnd = true; 
    }

    if(isEnd) {
        saveMapResult(s);
        currentLiveMapState = null;
    }
}

function playNextMapFull() {
    let am = activeMatch, mObj = am.maps[am.currentMapIdx];
    let s = { r1:0, r2:0, l1:0, l2:0, r:0, h:[], m1: 800, m2: 800, t1T: (mObj.t_start === am.t1.name) };
    
    for(let i=0; i<80; i++){
        s = conductUltraRound(am.t1, am.t2, mObj, s);
        if((s.r1===13 && s.r2<12) || (s.r2===13 && s.r1<12)) break;
        if(s.r1>=12 && s.r2>=12){ 
            let lim=16; while(s.r1>lim-1 && s.r2>lim-1) lim+=3; 
            if((s.r1===lim && Math.abs(s.r1-s.r2)>=2) || (s.r2===lim && Math.abs(s.r2-s.r1)>=2)) break; 
        }
    }
    saveMapResult(s);
}

function saveMapResult(s) {
    let am = activeMatch, mObj = am.maps[am.currentMapIdx];
    am.results.push({ name: mObj.name, score: `${s.r1}:${s.r2}`, rounds: s.h, t_start: mObj.t_start, ct_start: mObj.ct_start, sideBonus: MAP_DATA[mObj.name].side, bonus: MAP_DATA[mObj.name].bonus });
    if(s.r1 > s.r2) am.wins1++; else am.wins2++;
    am.currentMapIdx++;
    db.ref(`matches/${currentTourneyId}/${am.id}`).update({ total: `${am.wins1}:${am.wins2}`, details: am.results });
    if(am.wins1 >= Math.ceil(am.bo/2) || am.wins2 >= Math.ceil(am.bo/2)) { activeMatch = null; document.getElementById("currentSeriesDisplay").style.display="none"; } 
    else renderActiveMatch();
}

function renderHistory() {
    document.getElementById("matchHistory").innerHTML = matches.map(m => `
        <div class="match-card">
            <div class="match-stage">${m.stage || 'Match'}</div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span><b>${m.t1}</b> vs <b>${m.t2}</b></span>
                <b style="color:var(--accent); font-size:1.8em;">${m.total}</b>
            </div>
            ${(m.details || []).map(d => `
                <div class="map-row">
                    <div style="display:flex; justify-content:space-between; border-bottom: 1px solid #333; padding-bottom:5px; margin-bottom:10px;">
                        <b style="color:var(--info)">${d.name}</b> <b>${d.score}</b>
                    </div>
                    <div class="round-history">${d.rounds.join(" ")}</div>
                </div>
            `).join("")}
        </div>`).join("");
}

checkState();
</script>
